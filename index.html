  if(!entry) return `<div class="rivalry-card"><div class="rivalry-label">${label}</div><div class="no-data-note">Not enough data</div></div>`;
  return `<div class="rivalry-card ${cls}">
    <div class="rivalry-label">${label}</div>
    <div class="rivalry-name">${escapeHtml(entry.team)}</div>
    <div class="rivalry-detail">${entry.wins}-${entry.losses}-${entry.ties} · ${Math.round(entry.winRate*100)}% win rate</div>
  </div>`;
}
function teamDashboardCardHTML(d){
  const medal = d.rank===1?'gold':d.rank===2?'silver':d.rank===3?'bronze':'';
  const streakLabel = d.streak>0 ? `${d.streak}${d.streakType==='win'?'W':d.streakType==='loss'?'L':'T'}` : '—';
  const catRows = d.catTeam.map(c => {
    const league = d.catAverages.find(x=>x.label===c.label);
    const pctFill = Math.min(100, (c.avg/c.max)*100);
    const leaguePct = league ? Math.min(100,(league.avg/c.max)*100) : null;
    return `<div class="cat-row">
      <span class="cat-row-label">${c.label}</span>
      <div class="cat-row-track">
        <div class="cat-row-fill" style="width:${pctFill}%"></div>
        ${leaguePct!=null ? `<div class="cat-row-marker" style="left:${leaguePct}%" title="League avg: ${league.avg.toFixed(1)}"></div>` : ''}
      </div>
      <span class="cat-row-value">${c.avg.toFixed(1)}</span>
    </div>`;
  }).join('');

  return `<div class="team-card">
    <div class="team-card-head">
      <div class="team-card-rank ${medal}">${d.rank || '—'}</div>
      <div class="team-card-name">${escapeHtml(d.team)}</div>
      <div class="team-card-record"><span class="ts-record-win">${d.wins}</span>-<span class="ts-record-loss">${d.losses}</span>-<span class="ts-record-tie">${d.ties}</span></div>
    </div>

    <div class="team-mini-stats">
      <div class="team-mini-stat"><div class="tms-label">Win Rate</div><div class="tms-value">${Math.round(d.winRate*100)}%</div></div>
      <div class="team-mini-stat"><div class="tms-label">Avg Score</div><div class="tms-value">${d.avgScoreTeam.toFixed(1)}</div></div>
      <div class="team-mini-stat"><div class="tms-label">Avg RP</div><div class="tms-value">${d.avgRPTeam.toFixed(1)}</div></div>
      <div class="team-mini-stat"><div class="tms-label">High Score</div><div class="tms-value">${d.highScoreTeam}</div></div>
      <div class="team-mini-stat"><div class="tms-label">Avg Margin</div><div class="tms-value" style="color:${d.avgMargin>=0?'var(--green)':'var(--red)'}">${d.avgMargin>=0?'+':''}${d.avgMargin.toFixed(1)}</div></div>
      <div class="team-mini-stat"><div class="tms-label">Streak</div><div class="tms-value">${streakLabel}</div></div>
    </div>

    <div class="team-section-title">Scoring Category Averages <span style="color:var(--gold);text-transform:none;font-weight:500;">(mark = league avg)</span></div>
    <div class="team-cat-bars">${catRows}</div>

    <div class="team-section-title">Ranking Point Coordination</div>
    <div class="team-bonus-grid">
      <div class="team-bonus-tile"><div class="tbt-label">Power Share hit rate</div><div class="tbt-bar-track"><div class="tbt-bar-fill" style="width:${d.psRate*100}%"></div></div><span class="tbt-pct">${Math.round(d.psRate*100)}%</span></div>
      <div class="team-bonus-tile"><div class="tbt-label">Double Climb hit rate</div><div class="tbt-bar-track"><div class="tbt-bar-fill" style="width:${d.dcRate*100}%"></div></div><span class="tbt-pct">${Math.round(d.dcRate*100)}%</span></div>
      <div class="team-bonus-tile"><div class="tbt-label">Battery Orb bonus rate</div><div class="tbt-bar-track"><div class="tbt-bar-fill" style="width:${d.battRate*100}%"></div></div><span class="tbt-pct">${Math.round(d.battRate*100)}%</span></div>
      <div class="team-bonus-tile"><div class="tbt-label">Capacitor Orb bonus rate</div><div class="tbt-bar-track"><div class="tbt-bar-fill" style="width:${d.capRate*100}%"></div></div><span class="tbt-pct">${Math.round(d.capRate*100)}%</span></div>
    </div>

    <div class="team-section-title">Alliance Chemistry</div>
    <div class="team-rivalry-grid">
      ${teamRivalryCardHTML('Best Teammate', d.bestPartner, 'good')}
      ${teamRivalryCardHTML('Toughest Teammate', d.worstPartner, 'bad')}
      ${teamRivalryCardHTML('Favorite Matchup', d.bestOpp, 'good')}
      ${teamRivalryCardHTML('Nemesis', d.worstOpp, 'bad')}
    </div>

    <div class="team-section-title">Score Trend by Match</div>
    ${teamSparklineSVG(d.sortedRecs)}
  </div>`;
}

  return `
  <div class="match-card final ${m.scored?'scored':''}" ${pending ? '' : `onclick="openScoreModal('final',${idx})"`}>
    <div class="match-num-row">
      <div class="match-num">GRAND FINALS · MATCH ${m.matchNum}</div>
      ${pending ? '' : (!m.scored
        ? `<button class="live-go-btn" onclick="event.stopPropagation();openLive('final',${idx})">🔴 GO LIVE</button>`
        : `<button class="rescore-btn" onclick="event.stopPropagation();rescoreMatch('final',${idx})" title="Recalculate this match's score with the current scoring rules">↻ Rescore</button>`)}
    </div>
    <div class="alliance-row">

      </div>

    ${(m.scored && !pending && m.durationSec!=null) ? `<div class="match-duration-note">⏱ Match time: ${fmtTime(m.durationSec)}</div>` : ''}

function renderFinalsTab(allScored){
  if(!S.finals){

      return `<div class="finals-locked">
        <div class="lock-icon">🔒</div>

      <div class="ac-tag">BLUE ALLIANCE</div>
      <div class="ac-teams">${f.blueAlliance.map(escapeHtml).join(' &amp; ')}</div>
      <div class="ac-wins">${f.blueWins} WIN${f.blueWins!==1?'S':''}</div>
    </div>
  </div>`;
  const pendingFinalReveal = !!(S.pendingReveal && S.pendingReveal.type==='final');
  if(f.champion && !pendingFinalReveal){
    const champTeams = f.champion==='red' ? f.redAlliance : f.blueAlliance;
    html += `<div class="champion-banner">🏆 ${champTeams.map(escapeHtml).join(' &amp; ')} win the Grand Finals!</div>`;
  }
  html += `<div class="match-grid">${f.matches.map((m,idx) => finalCardHTML(m,idx,f)).join('')}</div>`;
  return html;

    </div>

      ${available.map(r => {
        const idx = rankings.indexOf(r);
        return `<button class="pick-btn" onclick="pickAlliancePartner(${idx})">${escapeHtml(r.team)} <span class="pick-rank">#${idx+1}</span></button>`;
      }).join('')}
    </div>
  </div>`;
}
function startAllianceSelection(){
  const rankings = getRankings();
  S.allianceSelection = {
    redCaptain: rankings[0].team,
    blueCaptain: rankings[1].team,
    redTeam: [rankings[0].team],
    blueTeam: [rankings[1].team],
    turn: 'red'
  };
  if(rankings.length<=2){
    finalizeAllianceSelection();
    return;
  }
  saveState();
  renderApp();
}
function pickAlliancePartner(rankIdx){
  const sel = S.allianceSelection;
  if(!sel) return;
  const rankings = getRankings();
  const team = rankings[rankIdx].team;
  if(sel.turn==='red') sel.redTeam.push(team);
  else sel.blueTeam.push(team);
  const takenSet = new Set([...sel.redTeam, ...sel.blueTeam]);
  const remaining = rankings.filter(r => !takenSet.has(r.team));
  if(remaining.length===0){
    finalizeAllianceSelection();
  } else {
    sel.turn = sel.turn==='red' ? 'blue' : 'red';
    saveState();
    renderApp();
  }
}
function finalizeAllianceSelection(){
  const sel = S.allianceSelection;
  S.finals = {
    redAlliance: sel.redTeam,
    blueAlliance: sel.blueTeam,
    matches:[
      {matchNum:1, scored:false, redStats:blankStats(), blueStats:blankStats(), redScore:0, blueScore:0, winner:null, durationSec:null},
      {matchNum:2, scored:false, redStats:blankStats(), blueStats:blankStats(), redScore:0, blueScore:0, winner:null, durationSec:null},
      {matchNum:3, scored:false, redStats:blankStats(), blueStats:blankStats(), redScore:0, blueScore:0, winner:null, durationSec:null}
    ],
    redWins:0, blueWins:0, champion:null
  };
  S.allianceSelection = null;
  S.activeTab = 'finals';
  saveState();
  renderApp();
}
function updateFinalsProgress(){
  const f = S.finals;
  let redWins=0, blueWins=0;
  f.matches.forEach(m => {
    if(m.scored){
      if(m.winner==='red') redWins++;
      else if(m.winner==='blue') blueWins++;
    }
  });
  f.redWins = redWins; f.blueWins = blueWins;
  if(redWins>=2){ f.champion = 'red'; }
  else if(blueWins>=2){ f.champion = 'blue'; }
  else {
    f.champion = null;
    const unscored = f.matches.filter(m => !m.scored);
    if(unscored.length===0){
      f.matches.push({matchNum:f.matches.length+1, scored:false, redStats:blankStats(), blueStats:blankStats(), redScore:0, blueScore:0, winner:null, durationSec:null});
    }
  }
}

/* ============================= BREAK TIMER BAR ============================= */
let timerBarVisible = false;
let breakTimer = { totalSec:180, remainingSec:180, running:false, handle:null, targetTs:null };

function fmtTime(totalSec){
  totalSec = Math.max(0, Math.round(totalSec));
  const m = Math.floor(totalSec/60), s = totalSec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function toggleTimerBar(){ timerBarVisible = !timerBarVisible; renderApp(); }
function renderTimerBarHTML(){
  const pct = breakTimer.totalSec ? Math.max(0, Math.min(100, (breakTimer.remainingSec/breakTimer.totalSec*100))) : 0;
  const sliderFill = (breakTimer.totalSec/1800*100);
  return `
  <div class="timerbar">
    <div class="timerbar-row">
      <span class="timerbar-label">⏱ BREAK TIMER</span>
      <input type="range" class="fader timerbar-slider" min="10" max="1800" step="10"
        value="${breakTimer.totalSec}" style="--fill:${sliderFill}%"
        oninput="onBreakSliderInput(this.value)" ${breakTimer.running?'disabled':''}>
      <span class="timerbar-set" id="breakSetLabel">${fmtTime(breakTimer.totalSec)} set</span>
      <div class="timerbar-countdown ${breakTimer.remainingSec<=0?'done':''}" id="breakCountdownDisplay">${fmtTime(breakTimer.remainingSec)}</div>
      <button class="timerbar-btn" onclick="toggleBreakRun()" title="${breakTimer.running?'Pause':'Start'}">${breakTimer.running?'⏸':'▶'}</button>
      <button class="timerbar-btn" onclick="resetBreakTimer()" title="Reset">⟲</button>
    </div>
    <div class="timerbar-track"><div class="timerbar-fill" id="breakBarFill" style="width:${pct}%"></div></div>
  </div>`;
}
function onBreakSliderInput(v){
  breakTimer.totalSec = parseInt(v,10);
  if(!breakTimer.running) breakTimer.remainingSec = breakTimer.totalSec;
  const setLabel = document.getElementById('breakSetLabel'); if(setLabel) setLabel.textContent = fmtTime(breakTimer.totalSec)+' set';
  const cd = document.getElementById('breakCountdownDisplay'); if(cd){ cd.textContent = fmtTime(breakTimer.remainingSec); cd.classList.remove('done'); }
  const fill = document.getElementById('breakBarFill'); if(fill) fill.style.width = (breakTimer.remainingSec/breakTimer.totalSec*100)+'%';
  const slider = document.querySelector('.timerbar-slider'); if(slider) slider.style.setProperty('--fill',(breakTimer.totalSec/1800*100)+'%');
}
function toggleBreakRun(){
  breakTimer.running = !breakTimer.running;
  if(breakTimer.running){
    if(breakTimer.remainingSec<=0) breakTimer.remainingSec = breakTimer.totalSec;
    breakTimer.targetTs = Date.now() + breakTimer.remainingSec*1000;
    breakTimer.handle = setInterval(tickBreakTimer, 250);
    if(Math.random() < S.easterEggConfig.breakTime/100) playOneShot(AUDIO_SRC.eggBreakTime, 0.9);
  } else if(breakTimer.handle){
    clearInterval(breakTimer.handle); breakTimer.handle = null;
  }
  renderApp();
}
function tickBreakTimer(){
  const remain = Math.max(0, (breakTimer.targetTs - Date.now())/1000);
  breakTimer.remainingSec = remain;
  const cd = document.getElementById('breakCountdownDisplay'); if(cd) cd.textContent = fmtTime(remain);
  const fill = document.getElementById('breakBarFill'); if(fill) fill.style.width = (remain/breakTimer.totalSec*100)+'%';
  if(remain<=0){
    clearInterval(breakTimer.handle); breakTimer.handle = null; breakTimer.running = false;
    if(cd) cd.classList.add('done');
    beep();
  }
}
function resetBreakTimer(){
  if(breakTimer.handle){ clearInterval(breakTimer.handle); breakTimer.handle = null; }
  breakTimer.running = false;
  breakTimer.remainingSec = breakTimer.totalSec;
  renderApp();
}
function beep(){
  if(!isSoundOn()) return;
  const ctx = ensureAudioCtx();
  if(!ctx) return;
  try{
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = 880;
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.6);
    o.start(); o.stop(ctx.currentTime+0.65);
  }catch(e){ /* audio unavailable, ignore */ }
}

let audioCtx = null;
let musicEl = null;
function isSoundOn(){ return S.soundEnabled !== false; }
function toggleSound(){
  S.soundEnabled = !isSoundOn();
  if(!S.soundEnabled) stopMatchMusic();
  saveState();
  renderLive();

function ensureAudioCtx(){
  if(!isSoundOn()) return null;
  if(!audioCtx){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return null;
    try{ audioCtx = new AC(); }catch(e){ return null; }
  }
  if(audioCtx.state === 'suspended'){ audioCtx.resume().catch(()=>{}); }
  return audioCtx;
}
// A short synthesized chime — no chime audio file was supplied, so each tick
// of the start/end countdowns gets a quick electric "tick" tone instead, rising
// in pitch as the countdown gets closer to zero.
function playCountdownChime(secondsLeft){
  if(!isSoundOn()) return;
  const ctx = ensureAudioCtx();
  if(!ctx) return;
  try{
    const now = ctx.currentTime;
    const freq = 480 + Math.max(0, 5-secondsLeft)*55;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.32, now+0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, now+0.3);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now+0.32);
  }catch(e){ /* audio unavailable — countdown still works visually */ }
}
function playOneShot(src, volume){
  if(!isSoundOn()) return;
  try{
    const a = new Audio(src);
    a.volume = volume==null ? 1 : volume;
    a.play().catch(()=>{});
  }catch(e){ /* audio file unavailable */ }
}
function getMusicEl(){
  if(!musicEl){
    musicEl = new Audio(AUDIO_SRC.music);
    musicEl.loop = true;
    musicEl.volume = 0.25;
  }
  return musicEl;
}
function startMatchMusic(){
  if(!isSoundOn()) return;
  const el = getMusicEl();
  try{ el.currentTime = 0; }catch(e){ /* ignore */ }
  el.play().catch(()=>{});
}
function stopMatchMusic(){
  if(musicEl){ musicEl.pause(); }
}

function awinSpawnSparks(n, cx, cy, color){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, sp = 2+Math.random()*9;
    awinParticles.push({t:'spark', x:cx, y:cy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:1, decay:.015+Math.random()*.02, size:1+Math.random()*2.2, color});
  }
}
function awinSpawnConfetti(n, colors, canvas){
  for(let i=0;i<n;i++){
    awinParticles.push({t:'conf',
      x:Math.random()*canvas.width, y:-20-Math.random()*canvas.height*.4,
      vx:(Math.random()-.5)*1.6, vy:1.6+Math.random()*2.6,
      rot:Math.random()*Math.PI, vr:(Math.random()-.5)*.22,
      w:6+Math.random()*7, h:9+Math.random()*9,
      life:1, decay:.0022,
      color:colors[Math.floor(Math.random()*colors.length)],
      sway:Math.random()*Math.PI*2});
  }
}
function awinTick(){
  const canvas = document.getElementById('confettiCanvas');
  if(!canvas){ awinRaf = null; return; }
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  awinParticles = awinParticles.filter(p => p.life > 0);
  for(const p of awinParticles){
    p.life -= p.decay;
    if(p.t==='spark'){
      p.x += p.vx; p.y += p.vy; p.vy += .12; p.vx *= .985;
      ctx.globalAlpha = Math.max(p.life,0);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,7); ctx.fill();
    } else {
      p.sway += .04;
      p.x += p.vx + Math.sin(p.sway)*1.1;
      p.y += p.vy; p.rot += p.vr;
      ctx.globalAlpha = Math.min(1, p.life*3);
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      if(p.y > canvas.height+30) p.life = 0;
    }
  }
  ctx.globalAlpha = 1;
  awinRaf = requestAnimationFrame(awinTick);
}
function stopAwinFx(){
  if(awinRaf) cancelAnimationFrame(awinRaf);
  awinRaf = null;
  if(awinSparkTimer) clearInterval(awinSparkTimer);
  awinSparkTimer = null;
  awinTimers.forEach(clearTimeout);
  awinTimers = [];

// A synthesized "drum hit" — a low thump plus a short noise snap, standing in for a
// real drumroll sample. Pitch creeps up on each hit so the tension audibly builds.
function playDrumHit(t){
  if(!isSoundOn()) return;
  const ctx = ensureAudioCtx();
  if(!ctx) return;
  try{
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    const basePitch = 85 + t*45;
    osc.frequency.setValueAtTime(basePitch, now);
    osc.frequency.exponentialRampToValueAtTime(basePitch*0.6, now+0.1);
    gain.gain.setValueAtTime(0.5, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now+0.13);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now); osc.stop(now+0.15);

    const bufSec = 0.05;
    const bufSize = Math.round(ctx.sampleRate*bufSec);
    const buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0; i<bufSize; i++) data[i] = (Math.random()*2-1) * (1 - i/bufSize);
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.22, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, now+bufSec);
    noise.connect(noiseGain).connect(ctx.destination);
    noise.start(now);
  }catch(e){ /* audio unavailable — drumroll still works visually */ }
}

  const oy = 10 + Math.random()*80;
  for(let k=0;k<streakCount;k++){
    const angle = Math.random()*360;
    const el = document.createElement('div');
    el.className = 'awin-streak ambient';
    el.style.setProperty('--a', angle+'deg');
    el.style.setProperty('--ox', ox+'%');
    el.style.setProperty('--oy', oy+'%');
    stage.appendChild(el);
    setTimeout(()=>el.remove(), 700);
  }
}
function spawnAmbientStreaks(progress){
  const burstCount = 1 + Math.floor(progress*3);
  const streaksPerBurst = 3 + Math.floor(progress*4);
  for(let b=0;b<burstCount;b++) spawnFireworkBurst(streaksPerBurst);
}
let drumrollTimeoutHandle = null;
function runDrumroll(big, onComplete){
  const intervals = big ? DRUMROLL_INTERVALS_BIG_MS : DRUMROLL_INTERVALS_MS;
  let i = 0;
  function hit(){
    playDrumHit(i/intervals.length);
    flashNeutralGrid();
    spawnAmbientStreaks(i/intervals.length);
    i++;
    if(i < intervals.length) drumrollTimeoutHandle = setTimeout(hit, intervals[i]);
    else { drumrollTimeoutHandle = null; onComplete(); }
  }
  hit();
}
function stopDrumroll(){
  if(drumrollTimeoutHandle){ clearTimeout(drumrollTimeoutHandle); drumrollTimeoutHandle = null; }
}

// A short electrical zap — a burst of quick random-pitched blips standing in for a spark sound.
function playZapSound(){
  if(!isSoundOn()) return;
  const ctx = ensureAudioCtx();
  if(!ctx) return;
  try{
    const now = ctx.currentTime;
    for(let i=0; i<6; i++){
      const t = now + i*0.045;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(300+Math.random()*900, t);
      gain.gain.setValueAtTime(0.16, t);
      gain.gain.exponentialRampToValueAtTime(0.0001, t+0.04);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t); osc.stop(t+0.05);
    }
  }catch(e){ /* audio unavailable — spark still shows visually */ }
}
// Two quick low thumps ("lub-dub") for the close-game tension moment.
function playHeartbeat(){
  if(!isSoundOn()) return;
  const ctx = ensureAudioCtx();
  if(!ctx) return;
  try{
    [0, 0.16].forEach((offset, i) => {
      const t = ctx.currentTime + offset;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(i===0 ? 70 : 60, t);
      gain.gain.setValueAtTime(0.4, t);
      gain.gain.exponentialRampToValueAtTime(0.0001, t+0.14);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t); osc.stop(t+0.16);
    });
  }catch(e){ /* audio unavailable — shake still shows visually */ }
}
function triggerCloseGameTension(overlay){
  if(!overlay) return;
  playHeartbeat();
  overlay.classList.remove('overlay-shake');
  void overlay.offsetWidth;
  overlay.classList.add('overlay-shake');
}

function openResultReveal(){
  const pr = S.pendingReveal;
  if(!pr) return;
  const m = pr.type==='qual' ? S.qualMatches[pr.index] : (S.finals ? S.finals.matches[pr.index] : null);
  if(!m) return;
  const isFinal = pr.type==='final';
  const teams = isFinal ? {red:S.finals.redAlliance, blue:S.finals.blueAlliance} : {red:m.red, blue:m.blue};
  const isChampionship = isFinal && !!(S.finals && S.finals.champion && S.finals.champion===m.winner);
  const root = document.getElementById('revealRoot');
  if(!root) return;
  const colorClass = m.winner==='tie' ? 'gold' : m.winner;
  const DRUMROLL_START_DELAY_MS = 400;
  // Defensively clear any leftover timers from a reveal that got interrupted mid-sequence,
  // so a stale chain can't fire an extra sound/visual later on top of this new reveal.
  cancelRevealTimers();
  root.innerHTML = `
  <div class="live-results-overlay" id="liveResultsOverlay">
    <canvas id="confettiCanvas"></canvas>
    <div class="grid-charge-stage" id="gridChargeStage">${buildNeutralGridHTML()}</div>
    <div class="live-results-content" id="revealContent" style="opacity:0;transition:opacity .5s ease;"></div>
  </div>`;
  revealOuterTimeout = setTimeout(() => {
    revealOuterTimeout = null;
    runDrumroll(isChampionship, () => {
      const stage = document.getElementById('gridChargeStage');
      const overlay = document.getElementById('liveResultsOverlay');
      const closeGame = m.winner!=='tie' && Math.max(m.redScore,m.blueScore)>0 &&
        (Math.abs(m.redScore-m.blueScore)/Math.max(m.redScore,m.blueScore)) <= 0.15;
      const palette = AWIN_COLORS[m.winner];
      if(overlay){
        overlay.style.setProperty('--ally', palette.ally);
        overlay.style.setProperty('--ally-hot', palette.hot);
      }
      if(m.winner==='tie'){
        triggerTieSpark(overlay);
      } else if(closeGame){
        triggerCloseGameTension(overlay);
      }
      if(isChampionship){
        if(stage){ stage.className = 'breaker-charge-stage'; stage.innerHTML = buildCircuitBreakerHTML(colorClass) + buildLightBurstHTML(); }
        revealFinishTimeout = setTimeout(() => { revealFinishTimeout = null; renderRevealContent(m, teams, isFinal, pr); }, breakerTotalMs());
      } else {
        if(stage){ stage.className = 'grid-charge-stage'; stage.innerHTML = buildRevealGridHTML(colorClass) + buildLightBurstHTML(); }
        revealFinishTimeout = setTimeout(() => { revealFinishTimeout = null; renderRevealContent(m, teams, isFinal, pr); }, revealGridTotalMs());
      }
      requestAnimationFrame(() => {
        const overlayEl = document.getElementById('liveResultsOverlay');
        if(overlayEl) overlayEl.classList.add('burst-playing');
      });
    });
  }, DRUMROLL_START_DELAY_MS);
}
let revealOuterTimeout = null;
let revealFinishTimeout = null;
function cancelRevealTimers(){
  if(revealOuterTimeout){ clearTimeout(revealOuterTimeout); revealOuterTimeout = null; }
  if(revealFinishTimeout){ clearTimeout(revealFinishTimeout); revealFinishTimeout = null; }
  stopDrumroll();
  stopAwinFx();
}
function closeResultReveal(){
  S.pendingReveal = null;
  saveState();
  cancelRevealTimers();
  const root = document.getElementById('revealRoot');
  if(root) root.innerHTML = '';
  renderApp();
}

/* ============================= CLOUD SYNC (optional phone scoring) =============================
   Lets referees enter stats from their own phones during a live match, syncing to this screen in
   real time via Firebase Realtime Database. Entirely optional — if firebaseConfig below is left
   as the placeholder, none of this activates and the app behaves exactly as it always has.
   To enable: create a free project at https://console.firebase.google.com, enable Realtime
   Database, register a web app, and paste the config object it gives you in place of the one
   below, then paste the security rules from the project README into the Realtime Database
   Rules tab. */
const firebaseConfig = {
  apiKey: "AIzaSyA-l5cfObOVc4YgHDcvmpTBNB7kO4KE2SE",
  authDomain: "vex-camp-scoring.firebaseapp.com",
  databaseURL: "https://vex-camp-scoring-default-rtdb.firebaseio.com",
  projectId: "vex-camp-scoring",
  storageBucket: "vex-camp-scoring.firebasestorage.app",
  messagingSenderId: "80584730523",
  appId: "1:80584730523:web:15d1b60e20a9a070fb633e",
  measurementId: "G-2BPHE76JT9"
};
let fbEnabled = false;
let fbDb = null;
function fbInit(){
  if(!firebaseConfig.apiKey || firebaseConfig.apiKey === 'YOUR_API_KEY_HERE') return;
  try{
    firebase.initializeApp(firebaseConfig);
    fbDb = firebase.database();
    fbEnabled = true;
  }catch(e){ fbEnabled = false; /* misconfigured — app still works single-device */ }
}
fbInit();
function genSessionId(){
  return Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-4);
}
// One stable ID per event (not per match) so the referee QR code only needs to be scanned once —
// every match reuses the same Firebase path and the remote view just follows along.
function getCloudEventId(){
  if(!S.cloudEventId){ S.cloudEventId = genSessionId(); saveState(); }
  return S.cloudEventId;
}
function fbSessionRef(sessionId){
  return fbDb.ref('sessions/'+sessionId);
}
function fbCreateSession(sessionId, m, teams, durationSec){
  if(!fbEnabled) return;
  fbSessionRef(sessionId).set({
    matchLabel: (live.type==='final' ? 'GRAND FINALS · MATCH ' : 'MATCH ') + m.matchNum,
    isFinal: live.type==='final',
    redTeams: teams.red, blueTeams: teams.blue,
    phase: 'idle', durationSec: durationSec||0,
    redStats: m.redStats, blueStats: m.blueStats,
    powerShare: !!m.powerShare, doubleClimb: !!m.doubleClimb,
    updatedAt: firebase.database.ServerValue.TIMESTAMP
  }).catch(()=>{});
}
let fbListenerRef = null;
function fbSubscribe(sessionId){
  if(!fbEnabled) return;
  fbUnsubscribe();
  fbListenerRef = fbSessionRef(sessionId);
  fbListenerRef.on('value', snap => fbHandleRemoteUpdate(snap.val()));
}
function fbUnsubscribe(){
  if(fbListenerRef){ fbListenerRef.off(); fbListenerRef = null; }
}
function fbApplyDelta(sessionId, side, field, delta, max){
  if(!fbEnabled) return;
  fbSessionRef(sessionId).child(side+'Stats/'+field).transaction(cur => {
    let v = (cur||0) + delta;
    if(v<0) v = 0;
    if(max!=null && v>max) v = max;
    return v;
  });
}
function fbSetPhase(sessionId, phase){
  if(!fbEnabled || !sessionId) return;
  fbSessionRef(sessionId).update({phase}).catch(()=>{});
}
function fbSetDuration(sessionId, durationSec){
  if(!fbEnabled || !sessionId) return;
  fbSessionRef(sessionId).update({durationSec}).catch(()=>{});
}
function fbSetBonus(sessionId, powerShare, doubleClimb){
  if(!fbEnabled || !sessionId) return;
  fbSessionRef(sessionId).update({powerShare, doubleClimb}).catch(()=>{});
}
function fbDeleteSession(sessionId){
  if(!fbEnabled || !sessionId) return;
  fbUnsubscribe();
  fbSessionRef(sessionId).remove().catch(()=>{});
}
// Reconciles a remote change (from a referee's phone) into local state. Never writes back to
// Firebase from here — that's the one rule that prevents an echo loop between devices.
function fbHandleRemoteUpdate(data){
  if(!data || !live) return;
  const m = getLiveMatch();
  if(!m) return;
  // A referee's phone can request phase changes directly (no local `live` state of its own).
  // Only act if this device hasn't already made the same transition locally, otherwise the
  // echo of our own write would re-trigger the timer/audio a second time.
  if(data.phase === 'countdown' && live.phase === 'idle'){
    startLiveCountdown();
  } else if(data.phase === 'ended' && live.phase === 'running'){
    endLiveMatch();
  }
  let changed = false;
  ['red','blue'].forEach(side => {
    const remoteStats = data[side+'Stats'];
    if(!remoteStats) return;
    liveStatFields.forEach(([label,field]) => {
      const remoteVal = remoteStats[field];
      if(typeof remoteVal === 'number' && m[side+'Stats'][field] !== remoteVal){
        m[side+'Stats'][field] = remoteVal;
        changed = true;
        const el = document.getElementById(`live_${side}_${field}`);
        if(el) el.textContent = remoteVal;
      }
    });
  });
  if(typeof data.powerShare === 'boolean' && data.powerShare !== m.powerShare){
    m.powerShare = data.powerShare;
    const ps = document.getElementById('liveDoublePS'); if(ps) ps.checked = data.powerShare;
    changed = true;
  }
  if(typeof data.doubleClimb === 'boolean' && data.doubleClimb !== m.doubleClimb){
    m.doubleClimb = data.doubleClimb;
    const dc = document.getElementById('liveDoubleClimb'); if(dc) dc.checked = data.doubleClimb;
    changed = true;
  }
  if(changed) liveUpdateScores();
}
function refereeUrl(sessionId){
  return location.origin + location.pathname + '?ref=' + sessionId;
}
function openQrModal(){
  if(!fbEnabled) return;
  const root = document.getElementById('qrModalRoot');
  if(!root) return;
  const qr = qrcode(0, 'M');
  qr.addData(refereeUrl(getCloudEventId()));
  qr.make();
  root.innerHTML = `
  <div class="modal-overlay" onclick="closeQrModal()">
    <div class="modal-box qr-modal-box" onclick="event.stopPropagation()">
      <div class="modal-head">
        <h3>Remote Control QR Code</h3>
        <button class="modal-close" onclick="closeQrModal()">&times;</button>
      </div>
      <p class="qr-modal-note">Scan this once — it works for every match all day, automatically following whichever match is currently live. Anyone with the link can control the live match, so only share it with your scorekeepers.</p>
      <div class="qr-modal-single">
        ${qr.createSvgTag(5, 4)}
      </div>
    </div>
  </div>`;
}
function closeQrModal(){
  const root = document.getElementById('qrModalRoot');
  if(root) root.innerHTML = '';
}

/* ---------- Referee mobile view (?ref=<sessionId>) — full remote control ---------- */
let refSessionId = null;
function initRefereeMode(sessionId){
  const root = document.getElementById('app');
  if(!fbEnabled){
    if(root) root.innerHTML = `<div class="ref-view"><div class="ref-card"><h2>Cloud sync not set up</h2><p>Ask the scorekeeper to configure phone scoring first.</p></div></div>`;
    return;
  }
  refSessionId = sessionId;
  fbSessionRef(sessionId).on('value', snap => renderRefereeView(snap.val()));
}
function refStep(side, field, delta, max){
  if(!fbEnabled || !refSessionId) return;
  fbApplyDelta(refSessionId, side, field, delta, max);
}
function refToggleBonus(field, val){
  if(!fbEnabled || !refSessionId) return;
  fbSessionRef(refSessionId).update({[field]: val}).catch(()=>{});
}
function refSetPhase(phase){
  if(!fbEnabled || !refSessionId) return;
  fbSessionRef(refSessionId).update({phase}).catch(()=>{});
}
function refStepBtnsHTML(side, stats, phase){
  const locked = phase!=='running' && phase!=='ended';
  return liveStatFields.map(([label,field,max]) => `
    <div class="live-stat-row">
      <span class="live-stat-label">${label}</span>
      <div class="live-stepper">
        <button type="button" class="live-step-btn" ${locked?'disabled':''} onclick="refStep('${side}','${field}',-1,${max})">&minus;</button>
        <span class="live-step-val">${stats[field]||0}</span>
        <button type="button" class="live-step-btn" ${locked?'disabled':''} onclick="refStep('${side}','${field}',1,${max})">+</button>
      </div>
    </div>`).join('');
}
function renderRefereeView(data){
  const root = document.getElementById('app');
  if(!root) return;
  if(!data){
    root.innerHTML = `<div class="ref-view"><div class="ref-card"><h2>Between matches</h2><p>Waiting for the next match to go live — this page will update automatically, no need to rescan.</p></div></div>`;
    return;
  }
  const isFinal = !!data.isFinal;
  const redStats = data.redStats || {};
  const blueStats = data.blueStats || {};
  const locked = data.phase!=='running' && data.phase!=='ended';
  const statusText = data.phase==='running' ? 'Match running — go!' :
    data.phase==='ended' ? 'Match ended — review on the main screen, then confirm there' :
    data.phase==='countdown' ? 'Get ready…' : 'Ready to start whenever you are';
  let redRP = 0, blueRP = 0;
  if(!isFinal){
    const result = computeScoreAndRP(redStats, blueStats, !!data.powerShare, !!data.doubleClimb);
    redRP = result.redRP; blueRP = result.blueRP;
  }
  root.innerHTML = `
  <div class="ref-view">
    <div class="ref-header">
      <div class="ref-match-label">${escapeHtml(data.matchLabel||'')}</div>
    </div>
    <div class="ref-status">${escapeHtml(statusText)}</div>
    <div class="live-alliances">
      <div class="live-alliance red">
        <div class="live-alliance-tag">RED</div>
        <div class="live-teams-names">${(data.redTeams||[]).map(escapeHtml).join(' &amp; ')}</div>
        <div class="live-score red">${allianceScore(redStats)}</div>
        ${!isFinal ? `<div class="live-rp">+${redRP} RP</div>` : ''}
        <div class="live-steppers">${refStepBtnsHTML('red', redStats, data.phase)}</div>
      </div>
      <div class="live-alliance blue">
        <div class="live-alliance-tag">BLUE</div>
        <div class="live-teams-names">${(data.blueTeams||[]).map(escapeHtml).join(' &amp; ')}</div>
        <div class="live-score blue">${allianceScore(blueStats)}</div>
        ${!isFinal ? `<div class="live-rp">+${blueRP} RP</div>` : ''}
        <div class="live-steppers">${refStepBtnsHTML('blue', blueStats, data.phase)}</div>
      </div>
    </div>
    ${!isFinal ? `
    <div class="live-bonuses">
      <label class="toggle"><input type="checkbox" ${data.powerShare?'checked':''} onchange="refToggleBonus('powerShare', this.checked)" ${locked?'disabled':''}> Power Share <span>+2 RP all</span></label>
      <label class="toggle"><input type="checkbox" ${data.doubleClimb?'checked':''} onchange="refToggleBonus('doubleClimb', this.checked)" ${locked?'disabled':''}> Double Climb <span>+2 RP all</span></label>
    </div>` : ''}
    <div class="live-controls">
      ${data.phase==='idle' ? `<button class="live-start-btn" onclick="refSetPhase('countdown')">&#9654; Start Match</button>` : ''}
      ${data.phase==='running' ? `<button class="live-end-btn" onclick="refSetPhase('ended')">&#9632; End Match Early</button>` : ''}
      ${data.phase==='countdown' ? `<div class="live-countdown-note">Get ready…</div>` : ''}
      ${data.phase==='ended' ? `<div class="live-countdown-note">Waiting for the scorekeeper to confirm the result…</div>` : ''}
    </div>
  </div>`;
}

/* ============================= INIT ============================= */
(function(){
  const params = new URLSearchParams(location.search);
  if(params.has('ref')){
    initRefereeMode(params.get('ref'));
  } else {
    renderApp();
  }
})();
</script>
