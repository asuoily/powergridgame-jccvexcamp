<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Control — Power Grid (v2) Match Scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&family=Chakra+Petch:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0D12;
    --panel:#12151C;
    --panel-2:#181C25;
    --panel-3:#1F2430;
    --border:#262B39;
    --text:#EEF0F4;
    --text-dim:#8991A3;
    --text-faint:#5B6274;
    --red:#FF5A5A;
    --red-soft:rgba(255,90,90,0.10);
    --red-border:rgba(255,90,90,0.35);
    --blue:#4C8DFF;
    --blue-soft:rgba(76,141,255,0.10);
    --blue-border:rgba(76,141,255,0.35);
    --gold:#F2B705;
    --gold-soft:rgba(242,183,5,0.12);
    --green:#33D17A;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(ellipse at top, #14181f 0%, #0B0D12 55%);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Rajdhani',sans-serif;margin:0;letter-spacing:0.02em;}
  button{font-family:'Inter',sans-serif;cursor:pointer;}
  input{font-family:'Inter',sans-serif;}
  ::selection{background:var(--gold-soft);color:var(--gold);}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important;}
  }

  #app{max-width:1100px;margin:0 auto;padding:28px 20px 80px;}

  .brand-mark{
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.28em;
    color:var(--gold);
  }
  .game-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    font-weight:600;
    letter-spacing:0.06em;
    color:var(--text-dim);
    background:var(--panel-3);
    border:1px solid var(--border);
    padding:3px 9px;
    border-radius:20px;
    white-space:nowrap;
  }

  /* ---------- SETUP SCREEN ---------- */
  .setup-screen{
    min-height:calc(100vh - 60px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px 0;
  }
  .setup-card{
    width:100%;
    max-width:560px;
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--border);
    border-radius:20px;
    padding:36px 34px 30px;
    box-shadow:0 40px 80px -30px rgba(0,0,0,0.7);
    animation:riseIn .5s ease both;
  }
  @keyframes riseIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  .setup-card .brand{margin-bottom:26px;}
  .setup-card h1{font-size:30px;font-weight:700;margin:10px 0 8px;}
  .setup-card .sub{color:var(--text-dim);font-size:14.5px;line-height:1.55;margin:0;}

  .roster-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .roster-head span:first-child{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:15px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);}
  .roster-count{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-faint);}

  .team-inputs{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;}
  .team-slot{
    display:flex;align-items:center;gap:12px;
    background:var(--panel-3);
    border:1px solid var(--border);
    border-radius:10px;
    padding:8px 10px 8px 14px;
  }
  .team-slot label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-faint);
    letter-spacing:0.05em;
    min-width:58px;
  }
  .team-input{
    flex:1;background:transparent;border:none;color:var(--text);
    font-size:15px;padding:6px 4px;outline:none;
  }
  .team-input::placeholder{color:var(--text-faint);}
  .remove-team{
    background:none;border:none;color:var(--text-faint);
    font-size:20px;line-height:1;padding:4px 6px;border-radius:6px;
  }
  .remove-team:hover{color:var(--red);background:var(--red-soft);}
  .add-team{
    width:100%;background:none;border:1px dashed var(--border);
    color:var(--text-dim);border-radius:10px;padding:10px;
    font-size:13.5px;font-weight:500;transition:all .15s;
  }
  .add-team:hover{border-color:var(--gold);color:var(--gold);}

  .match-slider-block{margin:26px 0 8px;}
  .slider-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .slider-head span:first-child{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:15px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);}
  .slider-value{font-family:'JetBrains Mono',monospace;font-size:20px;color:var(--gold);font-weight:600;}

  input.fader{
    -webkit-appearance:none;appearance:none;
    width:100%;height:6px;border-radius:4px;
    background:linear-gradient(90deg, var(--gold) 0%, var(--gold) var(--fill,50%), var(--panel-3) var(--fill,50%));
    outline:none;
  }
  input.fader::-webkit-slider-thumb{
    -webkit-appearance:none;width:22px;height:22px;border-radius:5px;
    background:var(--text);border:3px solid var(--gold);
    cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.5);
  }
  input.fader::-moz-range-thumb{
    width:22px;height:22px;border-radius:5px;background:var(--text);
    border:3px solid var(--gold);cursor:pointer;
  }
  .slider-ticks{display:flex;justify-content:space-between;margin-top:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-faint);}

  .setup-error{color:var(--red);font-size:13px;min-height:18px;margin:14px 0 4px;}
  .start-btn{
    width:100%;padding:15px;border:none;border-radius:12px;
    background:linear-gradient(180deg,#ffd54a,var(--gold));
    color:#1a1300;font-weight:700;font-size:15.5px;font-family:'Rajdhani',sans-serif;
    letter-spacing:0.04em;text-transform:uppercase;
    box-shadow:0 10px 24px -8px rgba(242,183,5,0.5);
    transition:transform .12s ease;
  }
  .start-btn:hover{transform:translateY(-1px);}
  .start-btn:active{transform:translateY(0);}
  .back-link{
    background:none;border:none;color:var(--text-faint);font-size:12.5px;font-weight:600;
    letter-spacing:0.04em;padding:0 0 14px;display:inline-flex;align-items:center;gap:6px;
  }
  .back-link:hover{color:var(--gold);}

  /* ---------- INTRO ANIMATION ---------- */
  .intro-screen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:20px;
  }
  .intro-content{max-width:560px;}
  .intro-mark{
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.4em;
    color:var(--gold);opacity:0;animation:introFadeUp .6s ease .1s both;
  }
  .intro-title{
    font-size:42px;font-weight:700;margin:16px 0 12px;opacity:0;
    animation:introFadeUp .7s ease .35s both;
  }
  .intro-title span{color:var(--gold);}
  .intro-title .intro-version{
    color:var(--text);background:var(--panel-3);border:1px solid var(--border);
    font-size:18px;padding:3px 10px;border-radius:8px;vertical-align:middle;margin-left:6px;
  }
  .intro-sub{
    color:var(--text-dim);font-size:15px;line-height:1.6;margin:0 auto;max-width:420px;
    opacity:0;animation:introFadeUp .7s ease .65s both;
  }
  @keyframes introFadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .intro-loaderbar{
    width:220px;height:4px;border-radius:4px;background:var(--panel-3);margin:34px auto 0;overflow:hidden;
    opacity:0;animation:introFadeUp .5s ease .9s both;
  }
  .intro-loaderbar-fill{
    height:100%;width:0%;border-radius:4px;background:linear-gradient(90deg,var(--gold),#ffe08a);
    animation:introLoad 1.6s ease 1s forwards;
  }
  @keyframes introLoad{from{width:0%;}to{width:100%;}}

  /* ---------- LANDING SCREEN ---------- */
  .landing-options{display:flex;flex-direction:column;gap:12px;margin-top:8px;}
  .landing-btn{
    width:100%;text-align:left;background:var(--panel-3);border:1px solid var(--border);
    border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:4px;
    transition:all .15s ease;
  }
  .landing-btn:hover{border-color:var(--gold);transform:translateY(-1px);}
  .landing-btn-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;letter-spacing:0.02em;color:var(--text);}
  .landing-btn-desc{font-size:12.5px;color:var(--text-faint);}
  .landing-btn.primary{background:linear-gradient(180deg, rgba(242,183,5,0.14), rgba(242,183,5,0.05));border-color:rgba(242,183,5,0.4);}
  .landing-btn.primary .landing-btn-title{color:var(--gold);}

  /* ---------- TOURNAMENT SHELL ---------- */
  .top-bar{position:sticky;top:0;z-index:5;background:linear-gradient(180deg, rgba(11,13,18,0.97), rgba(11,13,18,0.88));backdrop-filter:blur(6px);padding:16px 0 14px;margin:-28px 0 22px;border-bottom:1px solid var(--border);}
  .brand-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .brand-group{flex:1;display:flex;align-items:center;gap:10px;}
  .rules-btn,.reset-btn{
    background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);
    padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:600;
    letter-spacing:0.02em;transition:all .15s;
  }
  .rules-btn:hover{border-color:var(--gold);color:var(--gold);}
  .reset-btn:hover{border-color:var(--red);color:var(--red);}

  .progress-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .progress-label{font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);white-space:nowrap;}
  .progress-track{flex:1;height:8px;background:var(--panel-3);border-radius:6px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#8CF0B4);transition:width .3s ease;}
  .progress-count{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--text-faint);white-space:nowrap;}

  .rules-panel{
    background:var(--panel-2);border:1px solid var(--border);border-radius:12px;
    padding:16px 18px;margin-bottom:14px;font-size:13px;color:var(--text-dim);
    animation:riseIn .25s ease both;
  }
  .rules-panel h4{font-family:'Rajdhani',sans-serif;color:var(--text);font-size:15px;margin:0 0 10px;letter-spacing:0.04em;}
  .rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px 18px;margin-bottom:12px;}
  .rules-grid div{display:flex;justify-content:space-between;border-bottom:1px dashed var(--border);padding:4px 0;}
  .rules-grid b{color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:600;}
  .rules-panel p{margin:6px 0;line-height:1.5;}

  .tabs{display:flex;gap:6px;background:var(--panel-2);padding:5px;border-radius:11px;border:1px solid var(--border);}
  .tab{flex:1;background:none;border:none;color:var(--text-dim);padding:10px 8px;border-radius:8px;font-weight:600;font-size:13.5px;transition:all .15s;}
  .tab.active{background:var(--panel-3);color:var(--gold);box-shadow:inset 0 0 0 1px var(--border);}
  .tab:hover:not(.active){color:var(--text);}

  /* ---------- MATCH CARDS ---------- */
  .match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
  .match-card{
    background:var(--panel-2);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 16px 14px;cursor:pointer;transition:border-color .15s, transform .15s;
    animation:riseIn .35s ease both;
  }
  .match-card:hover{border-color:var(--gold);transform:translateY(-2px);}
  .match-card.scored{border-color:rgba(51,209,122,0.35);}
  .match-num{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text-faint);letter-spacing:0.08em;margin-bottom:10px;}
  .alliance-row{display:flex;align-items:stretch;gap:10px;}
  .alliance{flex:1;border-radius:10px;padding:10px 12px;min-width:0;}
  .alliance.red{background:var(--red-soft);border:1px solid var(--red-border);}
  .alliance.blue{background:var(--blue-soft);border:1px solid var(--blue-border);}
  .alliance-tag{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11.5px;letter-spacing:0.12em;margin-bottom:6px;}
  .alliance.red .alliance-tag{color:var(--red);}
  .alliance.blue .alliance-tag{color:var(--blue);}
  .pill-list{display:flex;flex-direction:column;gap:4px;margin-bottom:6px;}
  .pill{font-size:12.5px;font-weight:500;color:var(--text);line-height:1.3;word-break:break-word;}
  .vs{align-self:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--text-faint);padding:0 2px;}
  .readout{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;display:flex;align-items:baseline;gap:6px;margin-top:4px;}
  .readout small{font-size:10.5px;font-weight:600;color:var(--gold);background:var(--gold-soft);padding:2px 6px;border-radius:5px;letter-spacing:0.03em;}
  .red-readout{color:var(--red);text-shadow:0 0 18px rgba(255,90,90,0.35);}
  .blue-readout{color:var(--blue);text-shadow:0 0 18px rgba(76,141,255,0.35);}
  .sitting-note{margin-top:10px;font-size:11.5px;color:var(--text-faint);font-style:italic;}
  .match-duration-note{margin-top:8px;font-size:11.5px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;letter-spacing:0.02em;}
  .card-cta{margin-top:12px;font-size:11.5px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-faint);text-align:center;padding-top:10px;border-top:1px dashed var(--border);}
  .match-card:hover .card-cta{color:var(--gold);}
  .reveal-cta{width:100%;margin-top:12px;}
  .match-card.final{border-style:solid;}

  /* ---------- RANKINGS ---------- */
  .rankings-panel{animation:riseIn .3s ease both;}
  .panel-note{color:var(--text-dim);font-size:13.5px;line-height:1.5;margin:0 0 18px;}
  .rankings-list{display:flex;flex-direction:column;gap:8px;}
  .rank-row{
    display:flex;align-items:center;gap:14px;background:var(--panel-2);
    border:1px solid var(--border);border-radius:12px;padding:12px 16px;position:relative;overflow:hidden;
  }
  .rank-row.gold{border-color:rgba(242,183,5,0.45);}
  .rank-row.silver{border-color:rgba(200,206,220,0.4);}
  .rank-row.bronze{border-color:rgba(205,140,90,0.4);}
  .rank-num{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;width:34px;color:var(--text-faint);}
  .rank-row.gold .rank-num{color:var(--gold);}
  .rank-row.silver .rank-num{color:#C8CEDC;}
  .rank-row.bronze .rank-num{color:#CD8C5A;}
  .rank-name{font-weight:600;font-size:14.5px;width:180px;flex-shrink:0;}
  .rank-bye-badge{
    display:inline-block;margin-left:8px;font-family:'JetBrains Mono',monospace;
    font-size:10px;font-weight:600;letter-spacing:0.03em;color:var(--gold);
    background:var(--gold-soft);border:1px solid rgba(242,183,5,0.35);
    border-radius:20px;padding:2px 7px;vertical-align:middle;
  }
  .rank-bar-wrap{flex:1;height:8px;background:var(--panel-3);border-radius:5px;overflow:hidden;}
  .rank-bar{height:100%;background:linear-gradient(90deg,var(--gold),#ffe08a);border-radius:5px;transition:width .4s ease;}
  .rank-rp{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--text);width:82px;text-align:right;}
  .rank-rp small{font-size:10px;color:var(--text-faint);margin-left:3px;font-weight:500;}
  .rank-rp-bonus{font-size:11px;color:var(--gold);font-weight:700;margin:0 2px;}
  .cut-line{display:flex;align-items:center;gap:10px;margin:6px 0;color:var(--text-faint);font-size:11.5px;letter-spacing:0.03em;}
  .cut-line::before,.cut-line::after{content:'';flex:1;border-top:1px dashed var(--red-border);}
  .cut-line span{white-space:nowrap;color:var(--red);font-weight:600;}

  /* ---------- FINALS ---------- */
  .finals-locked,.finals-ready{
    text-align:center;padding:60px 20px;background:var(--panel-2);border:1px solid var(--border);
    border-radius:16px;animation:riseIn .3s ease both;
  }
  .lock-icon{font-size:34px;margin-bottom:10px;}
  .finals-locked h3,.finals-ready h3{font-size:22px;margin-bottom:8px;}
  .finals-locked p,.finals-ready p{color:var(--text-dim);font-size:14px;max-width:420px;margin:0 auto 18px;line-height:1.5;}
  .seed-preview{display:flex;flex-direction:column;gap:8px;max-width:380px;margin:0 auto 22px;}
  .seed-pair{border-radius:10px;padding:10px 14px;font-size:13.5px;font-weight:500;text-align:left;}
  .seed-pair.red{background:var(--red-soft);border:1px solid var(--red-border);}
  .seed-pair.blue{background:var(--blue-soft);border:1px solid var(--blue-border);}
  .seed-tag{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.1em;margin-right:8px;}
  .seed-pair.red .seed-tag{color:var(--red);}
  .seed-pair.blue .seed-tag{color:var(--blue);}
  .pick-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:480px;margin:0 auto;}
  .pick-btn{
    background:var(--panel-3);border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:9px 14px;font-size:13.5px;font-weight:500;
    display:flex;align-items:center;gap:8px;transition:all .15s;
  }
  .pick-btn:hover{border-color:var(--gold);color:var(--gold);}
  .pick-rank{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-faint);}
  .pick-btn:hover .pick-rank{color:var(--gold);}

  .finals-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;animation:riseIn .3s ease both;}
  .alliance-card{flex:1;border-radius:14px;padding:20px;text-align:center;}
  .alliance-card.red{background:var(--red-soft);border:1px solid var(--red-border);}
  .alliance-card.blue{background:var(--blue-soft);border:1px solid var(--blue-border);}
  .ac-tag{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.14em;margin-bottom:8px;}
  .alliance-card.red .ac-tag{color:var(--red);}
  .alliance-card.blue .ac-tag{color:var(--blue);}
  .ac-teams{font-size:15px;font-weight:600;margin-bottom:10px;min-height:40px;}
  .ac-wins{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:26px;}
  .alliance-card.red .ac-wins{color:var(--red);}
  .alliance-card.blue .ac-wins{color:var(--blue);}
  .series-center{text-align:center;flex-shrink:0;padding:0 6px;}
  .series-label{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--text-faint);letter-spacing:0.1em;}
  .champion-banner{
    background:linear-gradient(90deg, var(--gold-soft), rgba(242,183,5,0.22), var(--gold-soft));
    border:1px solid rgba(242,183,5,0.5);border-radius:14px;padding:18px;text-align:center;
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:19px;color:var(--gold);margin-bottom:20px;
    animation:riseIn .4s ease both;
  }

  /* ---------- MODAL ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(6,7,10,0.72);backdrop-filter:blur(3px);
    display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;
    z-index:50;overflow-y:auto;animation:fadeIn .18s ease both;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal-box{
    background:var(--panel-2);border:1px solid var(--border);border-radius:18px;
    width:100%;max-width:620px;padding:26px 26px 22px;
    box-shadow:0 40px 100px -20px rgba(0,0,0,0.8);
    animation:riseIn .22s ease both;
  }
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .modal-head h3{font-size:20px;}
  .modal-close{background:none;border:none;color:var(--text-faint);font-size:26px;line-height:1;padding:0 4px;}
  .modal-close:hover{color:var(--red);}
  .modal-alliances{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .modal-alliance{border-radius:12px;padding:14px;}
  .modal-alliance.red{background:var(--red-soft);border:1px solid var(--red-border);}
  .modal-alliance.blue{background:var(--blue-soft);border:1px solid var(--blue-border);}
  .ma-label{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.12em;margin-bottom:4px;}
  .modal-alliance.red .ma-label{color:var(--red);}
  .modal-alliance.blue .ma-label{color:var(--blue);}
  .ma-teams{font-size:12.5px;color:var(--text-dim);margin-bottom:12px;line-height:1.4;}
  .stat-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px dashed rgba(255,255,255,0.06);}
  .stat-row:last-child{border-bottom:none;}
  .stat-label{font-size:12.5px;color:var(--text-dim);}
  .stepper{display:flex;align-items:center;gap:8px;}
  .step-btn{
    width:24px;height:24px;border-radius:6px;border:1px solid var(--border);
    background:var(--panel-3);color:var(--text);font-size:15px;line-height:1;
    display:flex;align-items:center;justify-content:center;font-weight:600;
  }
  .step-btn:hover{border-color:var(--gold);color:var(--gold);}
  .step-val{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;min-width:18px;text-align:center;}
  .modal-bonuses{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;padding:12px 14px;background:var(--panel-3);border-radius:10px;}
  .toggle{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text);cursor:pointer;}
  .toggle input{width:16px;height:16px;accent-color:var(--gold);}
  .toggle span{color:var(--text-faint);font-size:11.5px;margin-left:auto;}
  .modal-preview{display:flex;gap:16px;margin-bottom:18px;}
  .preview-side{flex:1;border-radius:12px;padding:14px;text-align:center;background:var(--panel-3);}
  .preview-label{display:block;font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:0.1em;color:var(--text-faint);margin-bottom:4px;}
  .preview-score{display:block;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:28px;}
  .preview-side.red .preview-score{color:var(--red);}
  .preview-side.blue .preview-score{color:var(--blue);}
  .preview-rp{display:block;font-size:11.5px;color:var(--gold);margin-top:4px;font-weight:600;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--text-dim);padding:11px 18px;border-radius:10px;font-weight:600;font-size:13.5px;}
  .btn-ghost:hover{border-color:var(--red);color:var(--red);}
  .btn-primary{
    background:linear-gradient(180deg,#ffd54a,var(--gold));color:#1a1300;border:none;
    padding:11px 22px;border-radius:10px;font-weight:700;font-size:13.5px;font-family:'Rajdhani',sans-serif;
    letter-spacing:0.03em;text-transform:uppercase;
  }
  .btn-primary:hover{transform:translateY(-1px);}

  @media(max-width:640px){
    .modal-alliances{grid-template-columns:1fr;}
    .rank-name{width:110px;font-size:13px;}
    .finals-header{flex-direction:column;}
    .alliance-row{flex-direction:column;}
    .vs{align-self:center;padding:2px 0;}
  }

  /* ---------- MATCH CARD: LIVE BUTTON ---------- */
  .match-num-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .match-num-row .match-num{margin-bottom:0;}
  .live-go-btn{
    background:var(--red-soft);border:1px solid var(--red-border);color:var(--red);
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.08em;
    padding:5px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;
    animation:liveDotPulse 1.8s ease-in-out infinite;
  }
  .live-go-btn:hover{background:var(--red-border);}
  @keyframes liveDotPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,90,90,0.35);}50%{box-shadow:0 0 0 6px rgba(255,90,90,0);}}
  .rescore-btn{
    background:var(--gold-soft);border:1px solid rgba(242,183,5,0.4);color:var(--gold);
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.06em;
    padding:5px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;
  }
  .rescore-btn:hover{background:rgba(242,183,5,0.22);}

  /* ---------- EDITABLE SCORING RULES ---------- */
  .rules-kicker{margin:0 0 12px;color:var(--text-faint);font-size:11.5px;letter-spacing:0.08em;text-transform:uppercase;}
  .rules-edit-note{color:var(--text-faint);font-size:11px;text-transform:none;letter-spacing:0;font-weight:500;}
  .rules-edit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px 18px;margin-bottom:14px;}
  .rules-edit-row{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    border-bottom:1px dashed var(--border);padding:5px 0;
  }
  .rules-edit-row span:first-child{color:var(--text-dim);}
  .rules-num-input{
    width:64px;background:var(--panel-3);border:1px solid var(--border);border-radius:6px;
    color:var(--gold);font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;
    padding:4px 6px;text-align:right;
  }
  .rules-num-input:focus{border-color:var(--gold);}
  .rules-edit-unit{color:var(--text-faint);font-size:10.5px;width:26px;flex-shrink:0;}
  .rules-note{color:var(--text-faint);font-size:12px;font-style:italic;line-height:1.5;}

  /* ---------- BREAK TIMER BAR ---------- */
  .autosave-note{font-size:11.5px;color:var(--text-faint);white-space:nowrap;margin-left:auto;}
  .timerbar{background:var(--panel-2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px;animation:riseIn .25s ease both;}
  .timerbar-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .timerbar-label{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12.5px;letter-spacing:0.08em;color:var(--text-dim);white-space:nowrap;}
  .timerbar-slider{width:200px;}
  .timerbar-set{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-faint);white-space:nowrap;}
  .timerbar-countdown{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;color:var(--gold);min-width:80px;text-align:center;}
  .timerbar-countdown.done{color:var(--red);animation:timerDonePulse 1s ease-in-out infinite;}
  @keyframes timerDonePulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
  .timerbar-btn{background:var(--panel-3);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:8px;font-size:15px;flex-shrink:0;}
  .timerbar-btn:hover{border-color:var(--gold);color:var(--gold);}
  .timerbar-track{height:6px;background:var(--panel-3);border-radius:4px;overflow:hidden;margin-top:10px;}
  .timerbar-fill{height:100%;background:linear-gradient(90deg,var(--gold),#ffe08a);}
  @media(max-width:640px){.timerbar-slider{width:110px;}}

  /* ---------- ANALYSIS TAB ---------- */
  .analysis-panel{animation:riseIn .3s ease both;}
  .analysis-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px;}
  .analysis-stat-card{background:var(--panel-2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:4px;}
  .as-label{font-family:'Rajdhani',sans-serif;font-size:11.5px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-dim);}
  .as-value{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:26px;color:var(--text);}
  .as-sub{font-size:11px;color:var(--text-faint);}
  .analysis-h{font-size:14.5px;letter-spacing:0.06em;color:var(--text-dim);margin:22px 0 12px;text-transform:uppercase;font-family:'Rajdhani',sans-serif;font-weight:700;}
  .analysis-bars{display:flex;flex-direction:column;gap:10px;}
  .analysis-bar-row{display:flex;align-items:center;gap:12px;}
  .analysis-bar-label{width:140px;flex-shrink:0;font-size:13px;color:var(--text);}
  .analysis-bar-track{flex:1;height:10px;background:var(--panel-3);border-radius:6px;overflow:hidden;}
  .analysis-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),#8cb8ff);border-radius:6px;transition:width .4s ease;}
  .analysis-bar-fill.gold{background:linear-gradient(90deg,var(--gold),#ffe08a);}
  .analysis-bar-value{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-faint);width:130px;text-align:right;flex-shrink:0;}
  @media(max-width:640px){.analysis-bar-label{width:88px;font-size:11.5px;}.analysis-bar-value{width:96px;font-size:10.5px;}}

  .team-stats-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;}
  .team-stats-table{width:100%;border-collapse:collapse;min-width:620px;font-family:'Inter',sans-serif;}
  .team-stats-table th{
    text-align:right;font-family:'Rajdhani',sans-serif;font-size:11.5px;letter-spacing:0.06em;text-transform:uppercase;
    color:var(--text-faint);padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--panel-3);
  }
  .team-stats-table th:first-child{text-align:left;}
  .team-stats-table td{padding:10px 12px;border-bottom:1px dashed var(--border);font-size:13px;color:var(--text);white-space:nowrap;text-align:right;}
  .team-stats-table td:first-child{text-align:left;font-weight:600;}
  .team-stats-table tr:last-child td{border-bottom:none;}
  .team-stats-table tbody tr:hover{background:var(--panel-3);}
  .ts-num{font-family:'JetBrains Mono',monospace;}
  .ts-record-win{color:var(--green);font-weight:600;}
  .ts-record-loss{color:var(--red);}
  .ts-record-tie{color:var(--gold);}
  .ts-rank-badge{
    display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;
    background:var(--panel-3);color:var(--text-faint);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;margin-right:8px;
  }
  @media(max-width:640px){.team-stats-table{font-size:12px;}.team-stats-table th,.team-stats-table td{padding:8px;}}

  /* ---------- TEAM DASHBOARD CARDS ---------- */
  .team-analysis-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;}
  .team-card{
    background:var(--panel-2);border:1px solid var(--border);border-radius:16px;
    padding:18px 18px 20px;animation:riseIn .35s ease both;
  }
  .team-card-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
  .team-card-rank{
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;color:var(--text-faint);
    background:var(--panel-3);border:1px solid var(--border);width:32px;height:32px;border-radius:9px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .team-card-rank.gold{color:var(--gold);border-color:rgba(242,183,5,0.45);}
  .team-card-rank.silver{color:#C8CEDC;border-color:rgba(200,206,220,0.4);}
  .team-card-rank.bronze{color:#CD8C5A;border-color:rgba(205,140,90,0.4);}
  .team-card-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;flex:1;min-width:0;}
  .team-card-record{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13.5px;white-space:nowrap;}
  .team-mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
  .team-mini-stat{background:var(--panel-3);border-radius:10px;padding:9px 8px;text-align:center;}
  .tms-label{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-faint);margin-bottom:4px;}
  .tms-value{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16.5px;color:var(--text);}
  .team-section-title{
    font-family:'Rajdhani',sans-serif;font-size:11.5px;font-weight:700;letter-spacing:0.07em;
    text-transform:uppercase;color:var(--text-faint);margin:16px 0 8px;
  }
  .team-cat-bars{display:flex;flex-direction:column;gap:7px;}
  .cat-row{display:flex;align-items:center;gap:8px;}
  .cat-row-label{width:96px;flex-shrink:0;font-size:11.5px;color:var(--text-dim);}
  .cat-row-track{flex:1;height:7px;background:var(--panel-3);border-radius:4px;overflow:hidden;position:relative;}
  .cat-row-fill{height:100%;background:linear-gradient(90deg,var(--blue),#8cb8ff);border-radius:4px;}
  .cat-row-marker{position:absolute;top:-2.5px;width:2px;height:12px;background:var(--gold);border-radius:1px;}
  .cat-row-value{width:42px;flex-shrink:0;text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-faint);}
  .team-bonus-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .team-bonus-tile{background:var(--panel-3);border-radius:10px;padding:9px 11px;}
  .tbt-label{font-size:11px;color:var(--text-dim);margin-bottom:6px;}
  .tbt-bar-track{height:6px;background:var(--panel);border-radius:4px;overflow:hidden;}
  .tbt-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),#ffe08a);border-radius:4px;}
  .tbt-pct{display:block;text-align:right;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--gold);margin-top:4px;}
  .team-rivalry-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .rivalry-card{background:var(--panel-3);border-radius:10px;padding:9px 11px;border:1px solid transparent;}
  .rivalry-card.good{border-color:rgba(51,209,122,0.3);}
  .rivalry-card.bad{border-color:var(--red-border);}
  .rivalry-label{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-faint);margin-bottom:4px;}
  .rivalry-name{font-weight:600;font-size:13px;margin-bottom:2px;word-break:break-word;}
  .rivalry-detail{font-size:10.5px;color:var(--text-faint);}
  .team-sparkline{width:100%;height:64px;display:block;margin-top:4px;}
  .no-data-note{color:var(--text-faint);font-size:11.5px;font-style:italic;padding:4px 0;}
  .analysis-section-lead{color:var(--text-dim);font-size:13px;line-height:1.5;margin:-6px 0 14px;}

  /* ---------- LIVE MATCH OVERLAY ---------- */
  .live-overlay{
    position:fixed;inset:0;z-index:100;
    background:radial-gradient(ellipse at top, #14181f 0%, #0B0D12 60%);
    display:flex;flex-direction:column;align-items:center;
    padding:22px 18px 34px;overflow-y:auto;
  }
  .live-overlay.live-fade-in{animation:fadeIn .2s ease both;}
  .live-topbar{width:100%;max-width:900px;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .live-topbar-actions{display:flex;align-items:center;gap:8px;}
  .live-label{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.1em;color:var(--text-dim);text-transform:uppercase;}
  .live-exit-btn{background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;}
  .live-exit-btn:hover{border-color:var(--red);color:var(--red);}
  .live-sound-btn{background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);padding:7px 10px;border-radius:8px;font-size:14px;line-height:1;}
  .live-sound-btn:hover{border-color:var(--gold);color:var(--gold);}
  .live-qr-btn{background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;}
  .live-qr-btn:hover{border-color:var(--gold);color:var(--gold);}

  /* ---------- QR MODAL ---------- */
  #qrModalRoot .modal-overlay{z-index:150;} /* must sit above .live-overlay (z-index:100) since it opens during a live match */
  .qr-modal-box{max-width:340px;text-align:center;}
  .qr-modal-note{font-size:12.5px;color:var(--text-faint);margin-bottom:18px;line-height:1.4;}
  .qr-modal-single{border-radius:12px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;background:var(--panel-3);border:1px solid var(--border);}
  .qr-modal-single svg{width:100%;max-width:220px;height:auto;background:#fff;border-radius:6px;padding:6px;}

  /* ---------- REFEREE MOBILE VIEW ---------- */
  .ref-view{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:24px 16px 40px;gap:18px;
    background:radial-gradient(ellipse at top, #14181f 0%, #0B0D12 60%);
  }
  .ref-card{background:var(--panel-2);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;max-width:400px;margin:auto;}
  .ref-header{text-align:center;}
  .ref-match-label{font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:0.1em;color:var(--text-faint);}
  .ref-teams{font-size:14px;color:var(--text-dim);margin-top:4px;}
  .ref-status{font-size:13px;font-weight:600;color:var(--gold);background:var(--panel-3);border-radius:10px;padding:8px 16px;text-align:center;}
  .live-timer-label{
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.14em;
    text-transform:uppercase;color:var(--text-faint);margin-top:4px;
  }
  .live-timer{
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:52px;color:var(--text);
    letter-spacing:0.02em;margin:6px 0 6px;text-shadow:0 0 30px rgba(242,183,5,0.25);
  }
  .live-timer.warn{color:var(--red);animation:timerDonePulse 1s ease-in-out infinite;}
  .live-timer.done{color:var(--red);text-shadow:0 0 30px rgba(255,90,90,0.4);}
  .live-match-length-note{color:var(--text-faint);font-size:12px;letter-spacing:0.03em;margin:0 0 18px;}
  .live-alliances{width:100%;max-width:900px;display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .live-alliance{border-radius:16px;padding:18px;text-align:center;}
  .live-alliance.red{background:var(--red-soft);border:1px solid var(--red-border);}
  .live-alliance.blue{background:var(--blue-soft);border:1px solid var(--blue-border);}
  .live-alliance-tag{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.14em;margin-bottom:6px;}
  .live-alliance.red .live-alliance-tag{color:var(--red);}
  .live-alliance.blue .live-alliance-tag{color:var(--blue);}
  .live-teams-names{font-size:13.5px;color:var(--text-dim);margin-bottom:10px;min-height:20px;}
  .live-score{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:64px;line-height:1;margin-bottom:2px;}
  .live-score.red{color:var(--red);text-shadow:0 0 26px rgba(255,90,90,0.4);}
  .live-score.blue{color:var(--blue);text-shadow:0 0 26px rgba(76,141,255,0.4);}
  .live-rp{font-size:12.5px;font-weight:700;color:var(--gold);margin-bottom:12px;}
  .live-steppers{display:flex;flex-direction:column;gap:4px;text-align:left;margin-top:8px;}
  .live-stat-row{display:flex;align-items:center;justify-content:space-between;padding:5px 2px;border-bottom:1px dashed rgba(255,255,255,0.06);}
  .live-stat-row:last-child{border-bottom:none;}
  .live-stat-label{font-size:12.5px;color:var(--text-dim);}
  .live-stepper{display:flex;align-items:center;gap:10px;}
  .live-step-btn{
    width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
    background:var(--panel-3);color:var(--text);font-size:18px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
  }
  .live-step-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
  .live-step-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .live-step-val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:17px;min-width:22px;text-align:center;}
  .live-bonuses{width:100%;max-width:900px;display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;padding:12px 14px;background:var(--panel-2);border:1px solid var(--border);border-radius:12px;}
  .live-controls{margin-top:6px;}
  .live-start-btn,.live-end-btn,.live-confirm-btn{
    padding:16px 40px;border:none;border-radius:14px;font-family:'Rajdhani',sans-serif;
    font-weight:700;font-size:18px;letter-spacing:0.05em;text-transform:uppercase;
    box-shadow:0 12px 26px -8px rgba(0,0,0,0.5);transition:transform .12s ease;
  }
  .live-start-btn,.live-confirm-btn{background:linear-gradient(180deg,#ffd54a,var(--gold));color:#1a1300;}
  .live-end-btn{background:linear-gradient(180deg,#ff7a7a,var(--red));color:#2a0000;}
  .live-start-btn:hover,.live-end-btn:hover,.live-confirm-btn:hover{transform:translateY(-1px);}
  .live-countdown-note{color:var(--text-dim);font-size:13px;letter-spacing:0.05em;text-transform:uppercase;}

  .live-review-banner{
    width:100%;max-width:900px;display:flex;align-items:center;gap:10px;
    background:var(--gold-soft);border:1px solid rgba(242,183,5,0.35);
    color:var(--gold);border-radius:10px;padding:10px 14px;margin:0 0 16px;
    font-size:13px;font-weight:600;letter-spacing:0.02em;
  }
  .live-ended-spinner{
    width:42px;height:42px;border-radius:50%;
    border:3px solid var(--panel-3);border-top-color:var(--gold);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .live-ended-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:26px;letter-spacing:0.08em;color:var(--text);}
  .live-ended-sub{color:var(--text-dim);font-size:14px;letter-spacing:0.03em;}

  .countdown-overlay{
    position:fixed;inset:0;z-index:110;background:rgba(6,7,10,0.85);
    display:flex;align-items:center;justify-content:center;
    transition:opacity .18s ease;
  }
  .countdown-overlay.countdown-exit{opacity:0;}
  .countdown-num{
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:220px;color:var(--gold);
    text-shadow:0 0 60px rgba(242,183,5,0.5);
  }
  .countdown-num.pulse{animation:countdownPulse .9s ease both;}
  @keyframes countdownPulse{
    0%{transform:scale(1.4);opacity:0;}
    30%{transform:scale(1);opacity:1;}
    100%{transform:scale(0.9);opacity:0.85;}
  }

  .live-results-overlay{
    position:fixed;inset:0;z-index:120;background:rgba(6,7,10,0.9);
    display:flex;align-items:center;justify-content:center;overflow:hidden;
  }
  .live-results-overlay canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  .live-results-content{position:relative;z-index:5;pointer-events:auto;text-align:center;padding:20px;max-width:480px;}
  /* Drumroll build-up — the same floor grid used by the win cinematic pulses dim and gray,
     then flashes brighter on each drum hit, so the suspense phase flows straight into the
     reveal instead of cutting to a different visual. */
  .drum-kicker{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;
    font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;letter-spacing:0.2em;
    color:var(--text-dim);text-shadow:0 0 14px rgba(255,255,255,0.25);white-space:nowrap;
  }
  /* Drumroll build-up — plain gray cells that flash in unison before the winner's color lands */
  .grid-cell.neutral{background:var(--panel-3);opacity:0.22;animation:none;}
  .grid-cell.neutral.flash{animation:neutralFlash 0.3s ease;}
  @keyframes neutralFlash{
    0%{opacity:0.22;box-shadow:none;}
    35%{opacity:0.95;background:rgba(255,255,255,0.5);box-shadow:0 0 14px rgba(255,255,255,0.4);}
    100%{opacity:0.22;background:var(--panel-3);box-shadow:none;}
  }

  /* ---------- CLOSE-GAME TENSION ---------- */
  .overlay-shake{animation:overlayShake 0.5s ease;}
  @keyframes overlayShake{
    0%,100%{transform:translate(0,0);}
    20%{transform:translate(-6px,3px);}
    40%{transform:translate(5px,-4px);}
    60%{transform:translate(-4px,-2px);}
    80%{transform:translate(3px,4px);}
  }


  .reveal-rank-changes{margin:18px auto 0;max-width:420px;background:var(--panel-2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;text-align:left;}
  .reveal-rank-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;}
  .reveal-rank-row{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:13px;padding:6px 0;border-bottom:1px dashed rgba(255,255,255,0.06);flex-wrap:wrap;}
  .reveal-rank-row:last-child{border-bottom:none;}
  .reveal-rank-team{font-weight:600;color:var(--text);flex:1;min-width:100px;}
  .reveal-rank-rp{font-family:'JetBrains Mono',monospace;color:var(--gold);white-space:nowrap;font-size:12px;}
  .reveal-rank-pos{font-family:'JetBrains Mono',monospace;color:var(--text-dim);white-space:nowrap;font-size:12px;}
  .rank-up{color:var(--green);}
  .rank-down{color:var(--red);}
  .rank-same{color:var(--text-faint);}

  .results-winner{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:44px;letter-spacing:0.05em;margin-bottom:6px;}
  .results-winner.red{color:var(--red);text-shadow:0 0 40px rgba(255,90,90,0.5);}
  .results-winner.blue{color:var(--blue);text-shadow:0 0 40px rgba(76,141,255,0.5);}
  .results-tie{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:40px;color:var(--gold);margin-bottom:10px;}
  .results-winner-teams{font-size:18px;color:var(--text);margin-bottom:24px;}
  .results-scoreline{display:flex;gap:20px;justify-content:center;margin-bottom:10px;}
  .results-score-block{background:var(--panel-2);border:1px solid var(--border);border-radius:14px;padding:14px 26px;min-width:120px;}
  .results-score-block span{display:block;font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:0.1em;color:var(--text-faint);margin-bottom:6px;}
  .results-score-block b{font-family:'JetBrains Mono',monospace;font-size:34px;}
  .results-score-block.red b{color:var(--red);}
  .results-score-block.blue b{color:var(--blue);}
  .results-score-block small{display:block;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--gold);margin-top:4px;font-weight:600;}
  .results-winner.champion-flicker{
    animation:championFlicker 1s steps(1,end) both;
  }
  @keyframes championFlicker{
    0%{opacity:0;} 6%{opacity:1;} 11%{opacity:0.2;} 16%{opacity:1;}
    30%{opacity:0.35;} 36%{opacity:1;} 100%{opacity:1;}
  }
  .champion-kicker-ribbon{
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11.5px;letter-spacing:0.2em;
    color:var(--gold);text-transform:uppercase;margin-bottom:10px;opacity:0.9;
  }

  .grid-charge-stage{
    position:absolute;inset:0;display:grid;
    grid-template-columns:repeat(12,1fr);grid-template-rows:repeat(7,1fr);
    gap:3px;padding:14px;pointer-events:none;
  }
  .grid-cell{border-radius:3px;background:var(--panel-3);opacity:0.15;animation:cellCharge 1.2s ease forwards;}
  .grid-cell.red{--cell-color:var(--red);}
  .grid-cell.blue{--cell-color:var(--blue);}
  .grid-cell.gold{--cell-color:var(--gold);}
  @keyframes cellCharge{
    0%{background:var(--panel-3);opacity:0.12;box-shadow:none;}
    55%{background:var(--cell-color);opacity:1;box-shadow:0 0 16px var(--cell-color);}
    100%{background:var(--cell-color);opacity:0.28;box-shadow:0 0 5px var(--cell-color);}
  }

  /* ---------- TIE MATCH SPARK ---------- */
  .tie-spark-overlay{position:absolute;inset:0;z-index:4;pointer-events:none;}
  .tie-spark-flicker{position:absolute;inset:0;background:rgba(242,183,5,0.35);animation:tieFlicker 0.55s steps(2,end);}
  .tie-spark-text{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;letter-spacing:0.22em;
    color:var(--gold);text-shadow:0 0 16px var(--gold);white-space:nowrap;
    animation:tieFlicker 0.55s steps(2,end);
  }
  @keyframes tieFlicker{
    0%{opacity:0;} 15%{opacity:1;} 30%{opacity:0;} 45%{opacity:0.85;} 60%{opacity:0;} 75%{opacity:0.65;} 100%{opacity:0;}
  }

  /* ---------- CIRCUIT BREAKER REVEAL (Grand Finals championship) ---------- */
  .breaker-charge-stage{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  .breaker-cell-grid{
    position:absolute;inset:0;display:grid;
    grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(5,1fr);
    gap:8px;padding:28px;
  }
  .breaker-cell{
    position:relative;border-radius:5px;background:var(--panel-3);
    border:1px solid var(--border);opacity:0.3;
    display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;
    animation:breakerTrip 0.9s ease forwards;
  }
  .breaker-cell.red{--cell-color:var(--red);}
  .breaker-cell.blue{--cell-color:var(--blue);}
  .breaker-cell.gold{--cell-color:var(--gold);}
  .breaker-lever{
    width:5px;height:65%;background:var(--text-faint);border-radius:2px;
    transform-origin:bottom center;transform:rotate(0deg);
    animation:leverFlip 0.9s ease forwards;
  }
  @keyframes breakerTrip{
    0%{background:var(--panel-3);border-color:var(--border);box-shadow:none;opacity:0.3;}
    45%{background:rgba(255,255,255,0.06);border-color:var(--cell-color);box-shadow:0 0 20px var(--cell-color);opacity:1;}
    100%{background:rgba(255,255,255,0.03);border-color:var(--cell-color);box-shadow:0 0 9px var(--cell-color);opacity:0.95;}
  }
  @keyframes leverFlip{
    0%{transform:rotate(0deg);background:var(--text-faint);}
    45%{transform:rotate(38deg);background:#fff;box-shadow:0 0 10px #fff;}
    100%{transform:rotate(38deg);background:var(--cell-color);box-shadow:0 0 6px var(--cell-color);}
  }
  .breaker-kicker{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;
    letter-spacing:0.24em;color:var(--text);opacity:0;white-space:nowrap;
    text-shadow:0 0 14px currentColor;
    animation-name:kickerFlicker;animation-timing-function:steps(1,end);animation-fill-mode:forwards;
  }
  @keyframes kickerFlicker{
    0%{opacity:0;} 8%{opacity:1;} 13%{opacity:0.15;} 18%{opacity:1;}
    70%{opacity:1;} 85%{opacity:0.25;} 92%{opacity:0.85;} 100%{opacity:0;}
  }
  .breaker-flash-layer{
    position:absolute;inset:0;z-index:3;background:#fff;opacity:0;
    animation:breakerFlash 0.55s ease forwards;
  }
  @keyframes breakerFlash{
    0%{opacity:0;} 18%{opacity:1;} 100%{opacity:0;}
  }

  /* ---------- LIGHT BURST (grafted from the cinematic reveal) ----------
     A quick converging-streak + flash + shockwave-ring impact, layered on top of the
     classic grid/breaker reveal instead of the slower floor+spotlight+panel scene. */
  .light-burst{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1;}
  /* left is offset back by the streak's own width so transform-origin (100%, its right
     end) lands exactly on --ox/--oy, regardless of width — otherwise the true rotation
     pivot sits width-away from the intended point, which pulls every streak toward one
     side no matter what angle or origin is used. */
  .awin-streak{position:absolute;top:var(--oy,50%);left:calc(var(--ox,50%) - 46vmax);height:3px;width:46vmax;
    background:linear-gradient(90deg, transparent, var(--ally-hot) 55%, #fff);
    border-radius:2px;opacity:0;transform-origin:100% 50%;
    filter:drop-shadow(0 0 6px var(--ally-hot))}
  .awin-streak.corner{
    height:5px;width:62vmax;left:calc(var(--ox,50%) - 62vmax);
    filter:drop-shadow(0 0 10px var(--ally-hot)) drop-shadow(0 0 20px var(--ally-hot));
  }
  /* Ambient streaks during the drumroll suspense — neutral-colored since the winner isn't
     known yet. Several little "firework" bursts, each its own point on screen, go off at
     once and get denser as the drumroll builds. */
  .awin-streak.ambient{
    animation:awinConverge .6s cubic-bezier(.7,0,.9,.4) forwards;
    background:linear-gradient(90deg, transparent, #aab4c4 55%, #fff);
    filter:drop-shadow(0 0 6px #aab4c4);
  }
  .burst-playing .awin-streak{animation:awinConverge .5s cubic-bezier(.7,0,.9,.4) forwards}
  @keyframes awinConverge{
    0%{opacity:0;transform:rotate(var(--a)) translateX(0) scaleX(1)}
    12%{opacity:1}
    100%{opacity:0;transform:rotate(var(--a)) translateX(-46vmax) scaleX(.05)}
  }
  .awin-flash{position:absolute;inset:0;background:#fff;opacity:0;}
  .burst-playing .awin-flash{animation:awinFlash .45s .25s ease-out forwards}
  @keyframes awinFlash{0%{opacity:0}25%{opacity:.85}100%{opacity:0}}
  .awin-ring{position:absolute;top:50%;left:50%;width:12vmin;height:12vmin;border-radius:50%;
    border:3px solid var(--ally-hot);opacity:0;transform:translate(-50%,-50%) scale(.2)}
  .burst-playing .awin-ring{animation:awinRing .9s cubic-bezier(.1,.6,.2,1) forwards}
  .burst-playing .awin-ring.r1{animation-delay:.15s}
  .burst-playing .awin-ring.r2{animation-delay:.3s}
  @keyframes awinRing{0%{opacity:.95;transform:translate(-50%,-50%) scale(.2);border-width:6px}
    100%{opacity:0;transform:translate(-50%,-50%) scale(11);border-width:1px}}

  @media(max-width:640px){
    .live-alliances{grid-template-columns:1fr;}
    .live-score{font-size:48px;}
    .live-timer{font-size:38px;}
    .countdown-num{font-size:120px;}
    .results-winner{font-size:28px;}
    .results-score-block{padding:12px 18px;min-width:100px;}
    .breaker-kicker{font-size:10.5px;letter-spacing:0.16em;}
  }

  /* ---------- FOOTER ---------- */
  .app-footer{text-align:center;color:var(--text-faint);font-size:12px;padding:6px 0 30px;font-family:'Inter',sans-serif;}
  .app-footer .heart{color:var(--red);}

  /* ---------- IDLE MASCOT ---------- */
  .nyan-mascot{
    position:fixed;top:22%;left:-170px;z-index:300;pointer-events:none;
    display:flex;align-items:center;animation:nyanFly 7s linear forwards;
  }
  .nyan-trail{
    width:130px;height:30px;margin-right:-6px;
    background:repeating-linear-gradient(180deg,
      #ff5a5a 0 5px, #ffb347 5px 10px, #f2e94e 10px 15px,
      #6bdc6b 15px 20px, #4c8dff 20px 25px, #9b6bff 25px 30px);
    opacity:0.9;clip-path:polygon(0 22%,100% 0,100% 100%,0 78%);
    animation:nyanTrailWave 0.4s ease-in-out infinite alternate;
  }
  .nyan-body{
    position:relative;width:54px;height:32px;flex:none;
    background:repeating-linear-gradient(90deg,#ffb6d5 0 8px,#ff8fc1 8px 16px);
    border-radius:7px;border:2px solid #d9558f;
    box-shadow:0 0 12px rgba(255,140,190,0.55);
    animation:nyanBob 0.4s ease-in-out infinite alternate;
  }
  .nyan-face{
    position:absolute;right:-24px;top:-9px;width:34px;height:28px;
    background:#f6dfae;border-radius:45% 45% 40% 40%;border:2px solid #caa15f;
  }
  .nyan-face::before,.nyan-face::after{
    content:'';position:absolute;top:-8px;width:0;height:0;
    border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:9px solid #f6dfae;
  }
  .nyan-face::before{left:1px;}
  .nyan-face::after{right:1px;}
  .nyan-eye{position:absolute;top:9px;width:4px;height:2px;background:#3a2a1a;border-radius:1px;}
  .nyan-eye.l{left:7px;}
  .nyan-eye.r{right:7px;}
  .nyan-cheek{position:absolute;top:15px;width:5px;height:3px;background:#ffb6c9;border-radius:50%;opacity:0.8;}
  .nyan-cheek.l{left:3px;}
  .nyan-cheek.r{right:3px;}
  @keyframes nyanFly{
    0%{left:-170px;}
    100%{left:110%;}
  }
  @keyframes nyanBob{
    0%{transform:translateY(0);} 100%{transform:translateY(-5px);}
  }
  @keyframes nyanTrailWave{
    0%{transform:translateY(0) scaleX(1);} 100%{transform:translateY(3px) scaleX(0.96);}
  }
</style>

<body>
<div id="app"></div>
<div id="liveRoot"></div>
<div id="revealRoot"></div>
<div id="qrModalRoot"></div>
<div class="app-footer">Made with <span class="heart">&#10084;</span> by Eric (mostly Claude)</div>

<!-- Optional cloud sync for phone-based remote scoring. The app works fully offline/single-device
     without any of this — see firebaseConfig below. Pinned SDK versions so a future Firebase
     release can't silently break the app mid-event. -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script src="qrcode.js"></script>
<script>
/* ============================= STATE ============================= */
function defaultState(){
  return {
    stage:'intro',
    setupTeams:['','','',''],
    numQualMatches:16,
    teams:[],
    qualMatches:[],
    activeTab:'schedule',
    finals:null,
    allianceSelection:null,
    pendingReveal:null,
    scoringMatch:null,
    showRules:false,
    scoringConfig:{lowerSwitch:2, upperSwitch:4, orbBattery:6, orbCapacitor:10, climb:15, terminalBall:1},
    rpConfig:{win:2, loss:0, tie:1, powerShareBonus:2, doubleClimbBonus:2, orbBatteryBonus:1, orbCapacitorBonus:1, orbBatteryThreshold:4, orbCapacitorThreshold:4, byeFairnessBonus:1},
    matchConfig:{durationSec:120},
    soundEnabled:true,
    easterEggConfig:{win:50, tie:50, breakTime:15, button:0.1},
    swapRedBlue:false,
    cloudEventId:null
  };
}
const STORAGE_KEY = 'fieldControl_powerGridV2_state';
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
  }catch(e){ /* storage unavailable — app still works, just won't persist */ }
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && parsed.stage){
        // Merge in any newly-added config fields for states saved by older versions
        const def = defaultState();
        parsed.scoringConfig = Object.assign({}, def.scoringConfig, parsed.scoringConfig||{});
        parsed.rpConfig = Object.assign({}, def.rpConfig, parsed.rpConfig||{});
        parsed.matchConfig = Object.assign({}, def.matchConfig, parsed.matchConfig||{});
        parsed.easterEggConfig = Object.assign({}, def.easterEggConfig, parsed.easterEggConfig||{});
        if(typeof parsed.soundEnabled !== 'boolean') parsed.soundEnabled = def.soundEnabled;
        if(typeof parsed.swapRedBlue !== 'boolean') parsed.swapRedBlue = def.swapRedBlue;
        if(typeof parsed.cloudEventId !== 'string') parsed.cloudEventId = def.cloudEventId;
        return parsed;
      }
    }
  }catch(e){ /* ignore corrupt/unavailable storage */ }
  return defaultState();
}
let S = loadState();
const app = document.getElementById('app');

/* ============================= HELPERS ============================= */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function blankStats(){
  return {lowerSwitch:0,upperSwitch:0,orbBattery:0,orbCapacitor:0,climb:0,terminalBall:0};
}
function allianceScore(s){
  const c = S.scoringConfig;
  return s.lowerSwitch*c.lowerSwitch + s.upperSwitch*c.upperSwitch + s.orbBattery*c.orbBattery + s.orbCapacitor*c.orbCapacitor + s.climb*c.climb + s.terminalBall*c.terminalBall;
}
function computeScoreAndRP(redStats, blueStats, powerShare, doubleClimb){
  const redScore = allianceScore(redStats);
  const blueScore = allianceScore(blueStats);
  const r = S.rpConfig;
  let redRP = 0, blueRP = 0;
  if(redScore > blueScore){ redRP = r.win; blueRP = r.loss; }
  else if(blueScore > redScore){ redRP = r.loss; blueRP = r.win; }
  else { redRP = r.tie; blueRP = r.tie; }
  if(powerShare){ redRP += r.powerShareBonus; blueRP += r.powerShareBonus; }
  if(doubleClimb){ redRP += r.doubleClimbBonus; blueRP += r.doubleClimbBonus; }
  if(redStats.orbBattery >= r.orbBatteryThreshold) redRP += r.orbBatteryBonus;
  if(blueStats.orbBattery >= r.orbBatteryThreshold) blueRP += r.orbBatteryBonus;
  if(redStats.orbCapacitor >= r.orbCapacitorThreshold) redRP += r.orbCapacitorBonus;
  if(blueStats.orbCapacitor >= r.orbCapacitorThreshold) blueRP += r.orbCapacitorBonus;
  return {redScore, blueScore, redRP, blueRP};
}
function getTeamMatchCounts(){
  const counts = {};
  S.teams.forEach(t => counts[t] = 0);
  S.qualMatches.forEach(m => {
    m.red.forEach(t => counts[t]++);
    m.blue.forEach(t => counts[t]++);
  });
  return counts;
}
function getByeBonusTeams(){
  if(!S.qualMatches.length) return {};
  const counts = getTeamMatchCounts();
  const values = Object.values(counts);
  const maxCount = Math.max(...values);
  const bonusTeams = {};
  S.teams.forEach(t => { if(counts[t] === maxCount - 1) bonusTeams[t] = true; });
  return bonusTeams;
}
function getRankings(){
  const totals = {};
  S.teams.forEach(t => totals[t] = 0);
  S.qualMatches.forEach(m => {
    if(m.scored){
      m.red.forEach(t => totals[t] += m.redRP);
      m.blue.forEach(t => totals[t] += m.blueRP);
    }
  });
  const bonusTeams = getByeBonusTeams();
  const fairnessBonus = S.rpConfig.byeFairnessBonus;
  S.teams.forEach(t => { if(bonusTeams[t]) totals[t] += fairnessBonus; });
  return S.teams.map(t => ({team:t, rp:totals[t]})).sort((a,b) => b.rp - a.rp);
}

/* ============================= SCHEDULE GENERATION ============================= */
function generateSchedule(teamNames, numMatches){
  const playCount = {};
  const partnerCount = {};
  const opponentCount = {};
  const colorCount = {};
  teamNames.forEach(t => {
    playCount[t] = 0;
    colorCount[t] = {red:0, blue:0};
    partnerCount[t] = {};
    opponentCount[t] = {};
    teamNames.forEach(o => { if(o!==t){ partnerCount[t][o]=0; opponentCount[t][o]=0; } });
  });

  const matches = [];
  for(let m=0; m<numMatches; m++){
    const sorted = shuffle(teamNames).sort((a,b) => playCount[a]-playCount[b]);
    const playing = sorted.slice(0,4);
    const sitting = sorted.slice(4);
    const [a,b,c,d] = playing;
    const splits = [
      [[a,b],[c,d]],
      [[a,c],[b,d]],
      [[a,d],[b,c]]
    ];
    let bestScore = Infinity;
    let bestSplits = [];
    splits.forEach(split => {
      const [p1,p2] = split;
      const partnerPenalty = partnerCount[p1[0]][p1[1]] + partnerCount[p2[0]][p2[1]];
      const oppPenalty = opponentCount[p1[0]][p2[0]] + opponentCount[p1[0]][p2[1]] +
                          opponentCount[p1[1]][p2[0]] + opponentCount[p1[1]][p2[1]];
      const score = partnerPenalty*2 + oppPenalty;
      if(score < bestScore){ bestScore = score; bestSplits = [split]; }
      else if(score === bestScore){ bestSplits.push(split); }
    });
    const chosen = bestSplits[Math.floor(Math.random()*bestSplits.length)];
    let [allianceX, allianceY] = chosen;

    const sumX = allianceX.reduce((s,t) => s + colorCount[t].red, 0);
    const sumY = allianceY.reduce((s,t) => s + colorCount[t].red, 0);
    let red, blue;
    if(sumX < sumY){ red = allianceX; blue = allianceY; }
    else if(sumY < sumX){ red = allianceY; blue = allianceX; }
    else if(Math.random() < 0.5){ red = allianceX; blue = allianceY; }
    else { red = allianceY; blue = allianceX; }

    playing.forEach(t => playCount[t]++);
    red.forEach(t => colorCount[t].red++);
    blue.forEach(t => colorCount[t].blue++);
    partnerCount[red[0]][red[1]]++; partnerCount[red[1]][red[0]]++;
    partnerCount[blue[0]][blue[1]]++; partnerCount[blue[1]][blue[0]]++;
    red.forEach(r => blue.forEach(bl => { opponentCount[r][bl]++; opponentCount[bl][r]++; }));

    matches.push({
      matchNum: m+1,
      red, blue, sitting,
      scored:false,
      redStats: blankStats(), blueStats: blankStats(),
      powerShare:false, doubleClimb:false,
      redScore:0, blueScore:0, redRP:0, blueRP:0,
      durationSec:null
    });
  }
  return matches;
}

  rankings.forEach((r,i) => {
    const medal = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const hasBonus = !!bonusTeams[r.team];

    html += `<div class="rank-row ${medal}">

/* ============================= RENDER: ANALYSIS TAB ============================= */
function renderAnalysisTab(){
  const scored = S.qualMatches.filter(m => m.scored);
  if(scored.length === 0){
    return `<div class="finals-locked">
      <div class="lock-icon">📊</div>
      <h3>No data yet</h3>
      <p>Score at least one qualification match to see live analysis of scoring trends, team performance, and match pace.</p>
    </div>`;
  }
  const avg = arr => arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : 0;
  const redScores = scored.map(m => m.redScore);
  const blueScores = scored.map(m => m.blueScore);
  const allScores = redScores.concat(blueScores);
  const avgScore = avg(allScores);
  const highScore = Math.max(...allScores);
  const highMatch = scored.find(m => m.redScore===highScore || m.blueScore===highScore);
  const avgRed = avg(redScores), avgBlue = avg(blueScores);

  const timedMatches = scored.filter(m => m.durationSec != null);
  const avgDuration = timedMatches.length ? avg(timedMatches.map(m => m.durationSec)) : null;
  const totalDuration = timedMatches.length ? timedMatches.reduce((a,m) => a+m.durationSec, 0) : null;
  const longestMatch = timedMatches.length ? timedMatches.reduce((a,b) => a.durationSec>b.durationSec ? a : b) : null;
  const shortestMatch = timedMatches.length ? timedMatches.reduce((a,b) => a.durationSec<b.durationSec ? a : b) : null;

  const fields = [
    ['Lower Switch','lowerSwitch',10],
    ['Upper Switch','upperSwitch',10],
    ['Orbs (Battery)','orbBattery',20],
    ['Orbs (Capacitor)','orbCapacitor',20],
    ['Climb','climb',2],
    ['Terminal Ball','terminalBall',30]
  ];
  const catAverages = fields.map(([label,key,max]) => {
    const vals = scored.flatMap(m => [m.redStats[key], m.blueStats[key]]);
    return {label, avg: avg(vals), max};
  });

  const teamAgg = {};
  S.teams.forEach(t => teamAgg[t] = {rp:0, matches:0, scoreSum:0, wins:0, losses:0, ties:0, high:0, durationSum:0, durationCount:0});
  scored.forEach(m => {
    const redWin = m.redScore > m.blueScore, blueWin = m.blueScore > m.redScore;
    m.red.forEach(t => {
      const a = teamAgg[t];
      a.rp += m.redRP; a.matches++; a.scoreSum += m.redScore;
      if(redWin) a.wins++; else if(blueWin) a.losses++; else a.ties++;
      if(m.redScore > a.high) a.high = m.redScore;
      if(m.durationSec != null){ a.durationSum += m.durationSec; a.durationCount++; }
    });
    m.blue.forEach(t => {
      const a = teamAgg[t];
      a.rp += m.blueRP; a.matches++; a.scoreSum += m.blueScore;
      if(blueWin) a.wins++; else if(redWin) a.losses++; else a.ties++;
      if(m.blueScore > a.high) a.high = m.blueScore;
      if(m.durationSec != null){ a.durationSum += m.durationSec; a.durationCount++; }
    });
  });
  const teamRows = S.teams.map(t => {
    const a = teamAgg[t];
    return {
      team:t,
      matches:a.matches,
      wins:a.wins, losses:a.losses, ties:a.ties,
      avgRP: a.matches ? a.rp/a.matches : 0,
      avgScore: a.matches ? a.scoreSum/a.matches : 0,
      high:a.high,
      avgDuration: a.durationCount ? a.durationSum/a.durationCount : null
    };
  }).sort((a,b) => b.avgScore - a.avgScore);
  const maxAvgScore = Math.max(1, ...teamRows.map(r => r.avgScore));

  return `<div class="analysis-panel">
    <div class="analysis-stat-grid">
      <div class="analysis-stat-card"><span class="as-label">Matches Scored</span><span class="as-value">${scored.length} / ${S.qualMatches.length}</span></div>
      <div class="analysis-stat-card"><span class="as-label">Avg Alliance Score</span><span class="as-value">${avgScore.toFixed(1)}</span></div>
      <div class="analysis-stat-card"><span class="as-label">Red Avg Score</span><span class="as-value red-readout">${avgRed.toFixed(1)}</span></div>
      <div class="analysis-stat-card"><span class="as-label">Blue Avg Score</span><span class="as-value blue-readout">${avgBlue.toFixed(1)}</span></div>
      <div class="analysis-stat-card"><span class="as-label">High Score</span><span class="as-value" style="color:var(--gold);">${highScore}</span><span class="as-sub">Match ${highMatch?highMatch.matchNum:'—'}</span></div>
      <div class="analysis-stat-card"><span class="as-label">Avg Match Time</span><span class="as-value">${avgDuration!=null?fmtTime(avgDuration):'—'}</span><span class="as-sub">${timedMatches.length} timed match${timedMatches.length!==1?'es':''}</span></div>
      <div class="analysis-stat-card"><span class="as-label">Total Time Played</span><span class="as-value">${totalDuration!=null?fmtTime(totalDuration):'—'}</span></div>
      <div class="analysis-stat-card"><span class="as-label">Longest Match</span><span class="as-value">${longestMatch?fmtTime(longestMatch.durationSec):'—'}</span><span class="as-sub">${longestMatch?'Match '+longestMatch.matchNum:'Use Go Live to track time'}</span></div>
      <div class="analysis-stat-card"><span class="as-label">Shortest Match</span><span class="as-value">${shortestMatch?fmtTime(shortestMatch.durationSec):'—'}</span><span class="as-sub">${shortestMatch?'Match '+shortestMatch.matchNum:''}</span></div>
    </div>

    <h4 class="analysis-h">Scoring Category Averages (per alliance)</h4>
    <div class="analysis-bars">
      ${catAverages.map(c => `
        <div class="analysis-bar-row">
          <span class="analysis-bar-label">${c.label}</span>
          <div class="analysis-bar-track"><div class="analysis-bar-fill" style="width:${Math.min(100,(c.avg/c.max*100))}%"></div></div>
          <span class="analysis-bar-value">${c.avg.toFixed(1)} / ${c.max}</span>
        </div>`).join('')}
    </div>

    <h4 class="analysis-h">Average Score by Team</h4>
    <div class="analysis-bars">
      ${teamRows.map(r => `
        <div class="analysis-bar-row">
          <span class="analysis-bar-label">${escapeHtml(r.team)}</span>
          <div class="analysis-bar-track"><div class="analysis-bar-fill gold" style="width:${(r.avgScore/maxAvgScore*100)}%"></div></div>
          <span class="analysis-bar-value">${r.avgScore.toFixed(1)} pts · ${r.avgRP.toFixed(1)} RP</span>
        </div>`).join('')}
    </div>

    <h4 class="analysis-h">Team Performance Breakdown</h4>
    <div class="team-stats-wrap">
      <table class="team-stats-table">
        <thead>
          <tr>
            <th>Team</th>
            <th>Record (W-L-T)</th>
            <th>Matches</th>
            <th>Avg Score</th>
            <th>High Score</th>
            <th>Avg RP</th>
            <th>Avg Match Time</th>
          </tr>
        </thead>
        <tbody>
          ${teamRows.map((r,i) => `
          <tr>
            <td><span class="ts-rank-badge">${i+1}</span>${escapeHtml(r.team)}</td>
            <td class="ts-num"><span class="ts-record-win">${r.wins}</span>-<span class="ts-record-loss">${r.losses}</span>-<span class="ts-record-tie">${r.ties}</span></td>
            <td class="ts-num">${r.matches}</td>
            <td class="ts-num">${r.avgScore.toFixed(1)}</td>
            <td class="ts-num">${r.high}</td>
            <td class="ts-num">${r.avgRP.toFixed(1)}</td>
            <td class="ts-num">${r.avgDuration!=null ? fmtTime(r.avgDuration) : '—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <h4 class="analysis-h">Team Dashboards</h4>
    <p class="analysis-section-lead">A deep-dive card for every team — scoring category breakdown, ranking-point coordination, alliance chemistry (best/worst teammates and matchups), and a match-by-match score trend.</p>
    <div class="team-analysis-grid">${buildTeamDashboards(scored, fields, catAverages, avg).map(teamDashboardCardHTML).join('')}</div>
  </div>`;
}

/* ---- Per-team deep analytics (used by the Team Dashboards section above) ---- */
function buildTeamDashboards(scored, fields, catAverages, avg){
  const rankIndexByTeam = {};
  getRankings().forEach((r,i) => { rankIndexByTeam[r.team] = i+1; });

  const teamRecords = {};
  S.teams.forEach(t => teamRecords[t] = []);
  scored.forEach(m => {
    const redWin = m.redScore > m.blueScore, blueWin = m.blueScore > m.redScore;
    const redResult = redWin ? 'win' : (blueWin ? 'loss' : 'tie');
    const blueResult = blueWin ? 'win' : (redWin ? 'loss' : 'tie');
    m.red.forEach(t => {
      teamRecords[t].push({
        matchNum:m.matchNum, partner:m.red.find(x=>x!==t), opponents:m.blue.slice(),
        teamScore:m.redScore, oppScore:m.blueScore, result:redResult, rp:m.redRP,
        stats:m.redStats, powerShare:!!m.powerShare, doubleClimb:!!m.doubleClimb
      });
    });
    m.blue.forEach(t => {
      teamRecords[t].push({
        matchNum:m.matchNum, partner:m.blue.find(x=>x!==t), opponents:m.red.slice(),
        teamScore:m.blueScore, oppScore:m.redScore, result:blueResult, rp:m.blueRP,
        stats:m.blueStats, powerShare:!!m.powerShare, doubleClimb:!!m.doubleClimb
      });
    });
  });

  function winRateOf(rec){ return rec.matches ? (rec.wins + rec.ties*0.5)/rec.matches : 0; }
  function buildTallyMap(records, keyFn){
    const map = {};
    records.forEach(rec => {
      keyFn(rec).forEach(k => {
        if(!map[k]) map[k] = {wins:0, losses:0, ties:0, matches:0};
        map[k].matches++;
        if(rec.result==='win') map[k].wins++;
        else if(rec.result==='loss') map[k].losses++;
        else map[k].ties++;
      });
    });
    return map;
  }

  return S.teams.map(team => {
    const recs = teamRecords[team];
    const matches = recs.length;
    const wins = recs.filter(r=>r.result==='win').length;
    const losses = recs.filter(r=>r.result==='loss').length;
    const ties = recs.filter(r=>r.result==='tie').length;
    const winRate = matches ? (wins + ties*0.5)/matches : 0;
    const scores = recs.map(r=>r.teamScore);
    const avgScoreTeam = avg(scores);
    const highScoreTeam = scores.length ? Math.max(...scores) : 0;
    const rpSum = recs.reduce((s,r)=>s+r.rp,0);
    const avgRPTeam = matches ? rpSum/matches : 0;
    const avgMargin = avg(recs.map(r=>r.teamScore-r.oppScore));

    const sortedRecs = recs.slice().sort((a,b)=>a.matchNum-b.matchNum);
    let streak = 0, streakType = null;
    for(let i=sortedRecs.length-1;i>=0;i--){
      const res = sortedRecs[i].result;
      if(streakType===null){ streakType = res; streak = 1; }
      else if(res===streakType){ streak++; }
      else break;
    }

    const catTeam = fields.map(([label,key,max]) => ({label, key, max, avg: avg(recs.map(r=>r.stats[key]))}));

    const psRate = matches ? recs.filter(r=>r.powerShare).length/matches : 0;
    const dcRate = matches ? recs.filter(r=>r.doubleClimb).length/matches : 0;
    const battRate = matches ? recs.filter(r=>r.stats.orbBattery >= S.rpConfig.orbBatteryThreshold).length/matches : 0;
    const capRate = matches ? recs.filter(r=>r.stats.orbCapacitor >= S.rpConfig.orbCapacitorThreshold).length/matches : 0;

    const partnerMap = buildTallyMap(recs, r => [r.partner]);
    const partnerEntries = Object.keys(partnerMap).map(p => Object.assign({team:p}, partnerMap[p], {winRate: winRateOf(partnerMap[p])}));
    let bestPartner = null, worstPartner = null;
    if(partnerEntries.length){
      bestPartner = partnerEntries.slice().sort((a,b)=> b.winRate-a.winRate || b.matches-a.matches)[0];
      worstPartner = partnerEntries.slice().sort((a,b)=> a.winRate-b.winRate || b.matches-a.matches)[0];
    }

    const oppMap = buildTallyMap(recs, r => r.opponents);
    const oppEntries = Object.keys(oppMap).map(o => Object.assign({team:o}, oppMap[o], {winRate: winRateOf(oppMap[o])}));
    let bestOpp = null, worstOpp = null;
    if(oppEntries.length){
      bestOpp = oppEntries.slice().sort((a,b)=> b.winRate-a.winRate || b.matches-a.matches)[0];
      worstOpp = oppEntries.slice().sort((a,b)=> a.winRate-b.winRate || b.matches-a.matches)[0];
    }

    return {
      team, rank: rankIndexByTeam[team]||null, matches, wins, losses, ties, winRate,
      avgScoreTeam, highScoreTeam, avgRPTeam, avgMargin, streak, streakType,
      catTeam, catAverages, psRate, dcRate, battRate, capRate,
      bestPartner, worstPartner, bestOpp, worstOpp, sortedRecs
    };
  });
}
function teamSparklineSVG(sortedRecs){
  if(!sortedRecs.length) return '<div class="no-data-note">No matches scored yet.</div>';
  const w = 300, h = 64, pad = 8;
  const scores = sortedRecs.map(r=>r.teamScore);
  const maxS = Math.max(...scores, 1);
  const minS = Math.min(...scores, 0);
  const range = Math.max(1, maxS-minS);
  const stepX = sortedRecs.length>1 ? (w-2*pad)/(sortedRecs.length-1) : 0;
  const pts = sortedRecs.map((r,i) => ({
    x: pad + i*stepX,
    y: h-pad - ((r.teamScore-minS)/range)*(h-2*pad),
    result: r.result, score: r.teamScore, matchNum: r.matchNum
  }));
  const linePts = pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const dotColor = res => res==='win' ? 'var(--green)' : (res==='loss' ? 'var(--red)' : 'var(--gold)');
  const dots = pts.map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.6" fill="${dotColor(p.result)}"><title>Match ${p.matchNum}: ${p.score} pts (${p.result})</title></circle>`).join('');
  return `<svg class="team-sparkline" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${linePts}" fill="none" stroke="var(--text-faint)" stroke-width="1.5" opacity="0.6"/>
    ${dots}
  </svg>`;
}
